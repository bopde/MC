<script>
/**
 * Hours & Expenses module.
 * Optimized for quick mobile entry — minimal taps to log time.
 */

var _loadedTimeEntries = [];
var _loadedExpenses = [];
var _editingEntryId = null;
var _editingExpenseId = null;

function renderHoursPage(container) {
  container.innerHTML =
    '<div class="tab-bar" id="hours-tabs">' +
      '<button type="button" class="active" onclick="showHoursTab(\'time\')">Time</button>' +
      '<button type="button" onclick="showHoursTab(\'expenses\')">Expenses</button>' +
    '</div>' +
    '<div id="hours-tab-content"></div>';

  showHoursTab('time');
}

function showHoursTab(tab) {
  var btns = document.querySelectorAll('#hours-tabs button');
  btns.forEach(function(btn, i) {
    btn.classList.toggle('active', (tab === 'time' && i === 0) || (tab === 'expenses' && i === 1));
  });
  if (tab === 'time') renderTimeEntryTab();
  else renderExpenseTab();
}

function renderTimeEntryTab() {
  var businesses = AppCache.businesses || [];
  var codes = AppCache.workCodes || [];
  var content = document.getElementById('hours-tab-content');

  var bizSelected = businesses.length === 1 ? businesses[0].business_id : '';
  var codeSelected = codes.length === 1 ? codes[0].code_id : '';
  var defaultRate = '';
  if (bizSelected) {
    var biz = businesses.find(function(b) { return idsMatch(b.business_id, bizSelected); });
    if (biz && biz.default_rate) defaultRate = biz.default_rate;
  }

  var presetRange = datePreset('yesterday');
  AppState.dateFrom = presetRange.from;
  AppState.dateTo = presetRange.to;

  content.innerHTML =
    '<form id="time-entry-form" onsubmit="submitTimeEntry(event)">' +
      '<div class="form-row">' +
        '<label>Business ' + buildSelect('te-business', businesses, 'business_id', 'name', { required: true, selected: bizSelected, placeholder: businesses.length === 1 ? false : 'Select...' }) + '</label>' +
        '<label>Contract <select id="te-contract"><option value="">None</option></select></label>' +
        '<label>Date <input type="date" id="te-date" required value="' + todayStr() + '"></label>' +
      '</div>' +
      '<div class="form-row">' +
        '<label>Start <input type="time" id="te-start" step="300" required value="09:00"></label>' +
        '<label>End <input type="time" id="te-end" step="300" required value="10:00"></label>' +
      '</div>' +
      '<div class="form-row">' +
        '<label>Code ' + buildCodeSelect('te-code', codes, { required: true, selected: codeSelected, placeholder: codes.length === 1 ? false : 'Select...' }) + '</label>' +
        '<label>Rate <input type="number" id="te-rate" step="0.01" required value="' + defaultRate + '"></label>' +
      '</div>' +
      '<label>Description <input type="text" id="te-desc" placeholder="What did you work on?"></label>' +
      '<div class="form-actions">' +
        '<button type="submit" class="btn-primary" id="te-submit-btn">Add entry</button>' +
        '<button type="button" class="btn-subtle" id="te-cancel-edit" style="display:none" onclick="cancelTimeEntryEdit()">Cancel</button>' +
      '</div>' +
    '</form>' +

    '<section style="margin-top:1.25rem;">' +
      '<div class="filters">' +
        buildDateFilters('te-filter-from', 'te-filter-to', AppState.dateFrom, AppState.dateTo) +
        '<label>Business ' + buildSelect('te-filter-biz', businesses, 'business_id', 'name', { placeholder: 'All', selected: AppState.hoursBiz }) + '</label>' +
        '<button type="button" class="btn-subtle" onclick="filterTimeEntries()">Apply</button>' +
      '</div>' +
      '<p class="muted small" style="margin:-0.5rem 0 0.5rem;">Default: today &amp; yesterday</p>' +
      '<div id="time-entries-list" aria-busy="true">Loading...</div>' +
    '</section>';

  // Auto-fill rate and filter contracts/codes when business changes
  document.getElementById('te-business').addEventListener('change', function() {
    var bizId = this.value;
    var biz = businesses.find(function(b) { return idsMatch(b.business_id, bizId); });
    if (biz && biz.default_rate) {
      document.getElementById('te-rate').value = biz.default_rate;
    }
    filterContractsByBusiness(bizId);
  });

  if (bizSelected) filterContractsByBusiness(bizSelected);

  // Auto-fill end time when start changes
  document.getElementById('te-start').addEventListener('change', function() {
    var endEl = document.getElementById('te-end');
    if (!endEl.value || endEl.value <= this.value) {
      endEl.value = addHoursToTime(this.value, 1);
    }
  });

  // Re-compute autofill when date changes
  document.getElementById('te-date').addEventListener('change', function() {
    updateTimeAutofill(_loadedTimeEntries);
  });

  filterTimeEntries();
}


function filterContractsByBusiness(bizId) {
  var contractEl = document.getElementById('te-contract');
  if (!contractEl) return;
  var contracts = (AppCache.contracts || []).filter(function(c) {
    return idsMatch(c.business_id, bizId);
  });
  var html = '<option value="">None</option>';
  contracts.forEach(function(c) {
    html += '<option value="' + escapeHtml(c.contract_id) + '">' + escapeHtml(c.name) + '</option>';
  });
  contractEl.innerHTML = html;

  var newEl = contractEl.cloneNode(true);
  contractEl.parentNode.replaceChild(newEl, contractEl);

  newEl.addEventListener('change', function() {
    var selected = contracts.find(function(c) { return idsMatch(c.contract_id, newEl.value); });
    var codeEl = document.getElementById('te-code');
    if (!codeEl) return;
    if (selected && selected.work_codes) {
      var allowedCodes = String(selected.work_codes).split(',').map(function(s) { return s.trim(); });
      var allCodes = AppCache.workCodes || [];
      var filtered = allCodes.filter(function(c) { return allowedCodes.indexOf(c.code_id) !== -1; });
      if (filtered.length > 0) {
        codeEl.innerHTML = buildCodeSelectOptions(filtered);
        return;
      }
    }
    codeEl.innerHTML = buildCodeSelectOptions(AppCache.workCodes || []);
  });

  if (contracts.length > 0) {
    newEl.value = contracts[0].contract_id;
    newEl.dispatchEvent(new Event('change'));
  }
}

function buildCodeSelectOptions(codes) {
  var html = '<option value="">Select...</option>';
  codes.forEach(function(c) {
    html += '<option value="' + escapeHtml(c.code_id) + '">' + escapeHtml(c.code_id + ' - ' + c.description) + '</option>';
  });
  return html;
}

function filterTimeEntries() {
  var fromEl = document.getElementById('te-filter-from');
  var toEl = document.getElementById('te-filter-to');
  var bizEl = document.getElementById('te-filter-biz');

  AppState.dateFrom = fromEl ? fromEl.value : AppState.dateFrom;
  AppState.dateTo = toEl ? toEl.value : AppState.dateTo;
  AppState.hoursBiz = bizEl ? bizEl.value : '';

  var filters = {
    dateFrom: AppState.dateFrom || undefined,
    dateTo: AppState.dateTo || undefined,
    business_id: AppState.hoursBiz || undefined
  };

  serverCall('getTimeEntries', filters).then(function(entries) {
    _loadedTimeEntries = entries || [];
    renderTimeEntriesTable(_loadedTimeEntries);
    updateTimeAutofill(_loadedTimeEntries);
  }).catch(function(err) {
    document.getElementById('time-entries-list').innerHTML =
      '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function updateTimeAutofill(entries) {
  var dateEl = document.getElementById('te-date');
  var startEl = document.getElementById('te-start');
  var endEl = document.getElementById('te-end');
  if (!dateEl || !startEl) return;

  var selectedDate = dateEl.value;
  var latestEnd = '';

  (entries || []).forEach(function(e) {
    if (e.date && String(e.date).slice(0, 10) === selectedDate && e.time_end) {
      var te = formatTime(e.time_end);
      if (te > latestEnd) latestEnd = te;
    }
  });

  if (latestEnd) {
    startEl.value = latestEnd;
    endEl.value = addHoursToTime(latestEnd, 1);
  } else {
    if (!startEl.value || startEl.value === '') {
      startEl.value = '09:00';
      endEl.value = '10:00';
    }
  }
}

function renderTimeEntriesTable(entries) {
  var el = document.getElementById('time-entries-list');
  if (!entries || entries.length === 0) {
    el.innerHTML = '<p class="muted">No time entries found.</p>';
    return;
  }

  entries.sort(function(a, b) {
    var d = new Date(b.date) - new Date(a.date);
    if (d !== 0) return d;
    return (b.time_start || '').localeCompare(a.time_start || '');
  });

  var totalHours = entries.reduce(function(s, e) { return s + (Number(e.hours) || 0); }, 0);
  var totalAmount = entries.reduce(function(s, e) { return s + (Number(e.line_total) || 0); }, 0);

  var html = '<div class="scroll-x"><table class="data-table"><thead><tr>' +
    '<th>Date</th><th>Business</th><th>Start</th><th>End</th><th>Code</th>' +
    '<th class="number">Hrs</th><th>Description</th>' +
    '<th class="number">Amount</th><th>Actions</th>' +
    '</tr></thead><tbody>';

  entries.forEach(function(e) {
    var bizName = '';
    var currency = 'NZD';
    if (AppCache.businesses) {
      var biz = AppCache.businesses.find(function(b) { return idsMatch(b.business_id, e.business_id); });
      if (biz) { bizName = biz.name; currency = biz.currency || 'NZD'; }
    }
    var actionsHtml = '';
    if (e.invoice_id && e.invoice_id !== '') {
      actionsHtml = '<span class="badge badge-paid">' + escapeHtml(e.invoice_id) + '</span>';
    } else {
      actionsHtml = '<button type="button" class="btn-small btn-subtle" onclick="editTimeEntry(\'' + escapeHtml(e.entry_id) + '\')">Edit</button> ' +
        '<button type="button" class="btn-small btn-subtle" onclick="deleteTimeEntry(\'' + escapeHtml(e.entry_id) + '\')">Delete</button>';
    }
    html += '<tr>' +
      '<td>' + formatDate(e.date) + '</td>' +
      '<td>' + escapeHtml(bizName) + '</td>' +
      '<td>' + formatTime(e.time_start) + '</td>' +
      '<td>' + formatTime(e.time_end) + '</td>' +
      '<td>' + escapeHtml(e.work_code) + '</td>' +
      '<td class="number">' + (Number(e.hours) || 0).toFixed(1) + '</td>' +
      '<td>' + escapeHtml(e.description) + '</td>' +
      '<td class="number">' + formatCurrency(e.line_total, currency) + '</td>' +
      '<td class="actions">' + actionsHtml + '</td>' +
      '</tr>';
  });

  html += '</tbody><tfoot><tr>' +
    '<td colspan="5"><strong>Total</strong></td>' +
    '<td class="number"><strong>' + totalHours.toFixed(1) + '</strong></td>' +
    '<td></td>' +
    '<td class="number"><strong>' + formatCurrency(totalAmount) + '</strong></td>' +
    '<td></td></tr></tfoot></table></div>';

  el.innerHTML = html;
}

function submitTimeEntry(event) {
  event.preventDefault();
  var contractEl = document.getElementById('te-contract');
  var data = {
    business_id: document.getElementById('te-business').value,
    date: document.getElementById('te-date').value,
    time_start: document.getElementById('te-start').value,
    time_end: document.getElementById('te-end').value,
    work_code: document.getElementById('te-code').value,
    rate: document.getElementById('te-rate').value,
    description: document.getElementById('te-desc').value,
    contract_id: contractEl ? contractEl.value : ''
  };

  var btn = document.getElementById('te-submit-btn');
  btn.setAttribute('aria-busy', 'true');

  if (_editingEntryId) {
    data.entry_id = _editingEntryId;
    serverCall('updateTimeEntry', data).then(function(updated) {
      showToast('Entry updated');
      cancelTimeEntryEdit();
      filterTimeEntries();
    }).catch(function(err) {
      showToast(err.message, 'error');
    }).finally(function() {
      btn.removeAttribute('aria-busy');
    });
  } else {
    serverCall('addTimeEntry', data).then(function(newEntry) {
      showToast('Entry added');
      document.getElementById('te-start').value = data.time_end;
      document.getElementById('te-end').value = addHoursToTime(data.time_end, 1);
      document.getElementById('te-desc').value = '';
      _loadedTimeEntries.push(newEntry);
      renderTimeEntriesTable(_loadedTimeEntries);
      updateTimeAutofill(_loadedTimeEntries);
    }).catch(function(err) {
      showToast(err.message, 'error');
    }).finally(function() {
      btn.removeAttribute('aria-busy');
    });
  }
}

function editTimeEntry(entryId) {
  var entry = _loadedTimeEntries.find(function(e) { return idsMatch(e.entry_id, entryId); });
  if (!entry) { showToast('Entry not found', 'error'); return; }

  _editingEntryId = entryId;

  document.getElementById('te-business').value = entry.business_id;
  filterContractsByBusiness(entry.business_id);
  document.getElementById('te-date').value = String(entry.date).slice(0, 10);
  document.getElementById('te-start').value = formatTime(entry.time_start);
  document.getElementById('te-end').value = formatTime(entry.time_end);
  document.getElementById('te-code').value = entry.work_code;
  document.getElementById('te-rate').value = entry.rate;
  document.getElementById('te-desc').value = entry.description || '';

  setTimeout(function() {
    var contractEl = document.getElementById('te-contract');
    if (contractEl && entry.contract_id) contractEl.value = entry.contract_id;
  }, 50);

  var btn = document.getElementById('te-submit-btn');
  btn.textContent = 'Save Changes';
  document.getElementById('te-cancel-edit').style.display = '';
  document.getElementById('time-entry-form').scrollIntoView({ behavior: 'smooth' });
}

function cancelTimeEntryEdit() {
  _editingEntryId = null;
  var btn = document.getElementById('te-submit-btn');
  if (btn) btn.textContent = 'Add entry';
  var cancelBtn = document.getElementById('te-cancel-edit');
  if (cancelBtn) cancelBtn.style.display = 'none';
  document.getElementById('te-desc').value = '';
}

function deleteTimeEntry(entryId) {
  if (!confirm('Delete this time entry?')) return;
  serverCall('deleteTimeEntry', entryId).then(function() {
    showToast('Entry deleted');
    _loadedTimeEntries = _loadedTimeEntries.filter(function(e) { return !idsMatch(e.entry_id, entryId); });
    renderTimeEntriesTable(_loadedTimeEntries);
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

// --- Expenses ---

function renderExpenseTab() {
  var businesses = AppCache.businesses || [];
  var codes = AppCache.workCodes || [];
  var content = document.getElementById('hours-tab-content');

  var bizSelected = businesses.length === 1 ? businesses[0].business_id : '';

  content.innerHTML =
    '<form id="expense-form" onsubmit="submitExpense(event)">' +
      '<div class="form-row">' +
        '<label>Business ' + buildSelect('exp-business', businesses, 'business_id', 'name', { required: true, selected: bizSelected, placeholder: businesses.length === 1 ? false : 'Select...' }) + '</label>' +
        '<label>Date <input type="date" id="exp-date" required value="' + todayStr() + '"></label>' +
      '</div>' +
      '<div class="form-row">' +
        '<label>Amount <input type="number" id="exp-amount" step="0.01" required></label>' +
        '<label>Code ' + buildCodeSelect('exp-code', codes, { required: true }) + '</label>' +
      '</div>' +
      '<label>What for <input type="text" id="exp-desc" placeholder="Description" required></label>' +
      '<div class="form-actions">' +
        '<button type="submit" class="btn-primary" id="exp-submit-btn">Add expense</button>' +
        '<button type="button" class="btn-subtle" id="exp-cancel-edit" style="display:none" onclick="cancelExpenseEdit()">Cancel</button>' +
      '</div>' +
    '</form>' +

    '<section style="margin-top:1.25rem;">' +
      '<div class="filters">' +
        buildDateFilters('exp-filter-from', 'exp-filter-to', AppState.dateFrom, AppState.dateTo) +
        '<label>Business ' + buildSelect('exp-filter-biz', businesses, 'business_id', 'name', { placeholder: 'All' }) + '</label>' +
        '<button type="button" class="btn-subtle" onclick="loadExpenses()">Apply</button>' +
      '</div>' +
      '<div id="expenses-list" aria-busy="true">Loading...</div>' +
    '</section>';

  loadExpenses();
}

function loadExpenses() {
  var fromEl = document.getElementById('exp-filter-from');
  var toEl = document.getElementById('exp-filter-to');
  var bizEl = document.getElementById('exp-filter-biz');
  var filters = {
    dateFrom: fromEl ? fromEl.value : AppState.dateFrom,
    dateTo: toEl ? toEl.value : AppState.dateTo,
    business_id: bizEl ? bizEl.value || undefined : undefined
  };

  serverCall('getExpenses', filters).then(function(expenses) {
    _loadedExpenses = expenses || [];
    renderExpensesTable(_loadedExpenses);
  }).catch(function(err) {
    document.getElementById('expenses-list').innerHTML =
      '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function renderExpensesTable(expenses) {
  var el = document.getElementById('expenses-list');
  if (!expenses || expenses.length === 0) {
    el.innerHTML = '<p class="muted">No expenses found.</p>';
    return;
  }

  expenses.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  var total = expenses.reduce(function(s, e) { return s + (Number(e.amount) || 0); }, 0);

  var html = '<div class="scroll-x"><table class="data-table"><thead><tr>' +
    '<th>Date</th><th>Business</th><th>What</th>' +
    '<th class="number">Amount</th><th>Actions</th>' +
    '</tr></thead><tbody>';

  expenses.forEach(function(e) {
    var bizName = '';
    var currency = 'NZD';
    if (AppCache.businesses) {
      var biz = AppCache.businesses.find(function(b) { return idsMatch(b.business_id, e.business_id); });
      if (biz) { bizName = biz.name; currency = biz.currency || 'NZD'; }
    }
    var actionsHtml = '';
    if (e.invoice_id && e.invoice_id !== '') {
      actionsHtml = '<span class="badge badge-paid">' + escapeHtml(e.invoice_id) + '</span>';
    } else {
      actionsHtml = '<button type="button" class="btn-small btn-subtle" onclick="editExpense(\'' + escapeHtml(e.expense_id) + '\')">Edit</button> ' +
        '<button type="button" class="btn-small btn-subtle" onclick="deleteExpense(\'' + escapeHtml(e.expense_id) + '\')">Delete</button>';
    }
    html += '<tr>' +
      '<td>' + formatDate(e.date) + '</td>' +
      '<td>' + escapeHtml(bizName) + '</td>' +
      '<td>' + escapeHtml(e.description) + '</td>' +
      '<td class="number">' + formatCurrency(e.amount, currency) + '</td>' +
      '<td class="actions">' + actionsHtml + '</td>' +
      '</tr>';
  });

  html += '</tbody><tfoot><tr><td colspan="3"><strong>Total</strong></td>' +
    '<td class="number"><strong>' + formatCurrency(total) + '</strong></td>' +
    '<td></td></tr></tfoot></table></div>';

  el.innerHTML = html;
}

function submitExpense(event) {
  event.preventDefault();
  var data = {
    business_id: document.getElementById('exp-business').value,
    date: document.getElementById('exp-date').value,
    amount: document.getElementById('exp-amount').value,
    description: document.getElementById('exp-desc').value,
    work_code: document.getElementById('exp-code').value
  };

  var btn = document.getElementById('exp-submit-btn');
  btn.setAttribute('aria-busy', 'true');

  if (_editingExpenseId) {
    data.expense_id = _editingExpenseId;
    serverCall('updateExpense', data).then(function(updated) {
      showToast('Expense updated');
      cancelExpenseEdit();
      loadExpenses();
    }).catch(function(err) {
      showToast(err.message, 'error');
    }).finally(function() {
      btn.removeAttribute('aria-busy');
    });
  } else {
    serverCall('addExpense', data).then(function(newExpense) {
      showToast('Expense added');
      document.getElementById('exp-amount').value = '';
      document.getElementById('exp-desc').value = '';
      _loadedExpenses.push(newExpense);
      renderExpensesTable(_loadedExpenses);
    }).catch(function(err) {
      showToast(err.message, 'error');
    }).finally(function() {
      btn.removeAttribute('aria-busy');
    });
  }
}

function editExpense(expenseId) {
  var expense = _loadedExpenses.find(function(e) { return idsMatch(e.expense_id, expenseId); });
  if (!expense) { showToast('Expense not found', 'error'); return; }

  _editingExpenseId = expenseId;

  document.getElementById('exp-business').value = expense.business_id;
  document.getElementById('exp-date').value = String(expense.date).slice(0, 10);
  document.getElementById('exp-amount').value = expense.amount;
  document.getElementById('exp-desc').value = expense.description || '';
  document.getElementById('exp-code').value = expense.work_code;

  var btn = document.getElementById('exp-submit-btn');
  btn.textContent = 'Save Changes';
  document.getElementById('exp-cancel-edit').style.display = '';
  document.getElementById('expense-form').scrollIntoView({ behavior: 'smooth' });
}

function cancelExpenseEdit() {
  _editingExpenseId = null;
  var btn = document.getElementById('exp-submit-btn');
  if (btn) btn.textContent = 'Add expense';
  var cancelBtn = document.getElementById('exp-cancel-edit');
  if (cancelBtn) cancelBtn.style.display = 'none';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-desc').value = '';
}

function deleteExpense(expenseId) {
  if (!confirm('Delete this expense?')) return;
  serverCall('deleteExpense', expenseId).then(function() {
    showToast('Expense deleted');
    _loadedExpenses = _loadedExpenses.filter(function(e) { return !idsMatch(e.expense_id, expenseId); });
    renderExpensesTable(_loadedExpenses);
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}
</script>
