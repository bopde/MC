<script>
/**
 * Budget Allocations module.
 *
 * Simplified two-state model:
 *   allocated -> paid
 *
 * Withheld categories (Tax Withheld, ACC Withheld) are always 'paid'
 * because the payer already withheld them at source.
 *
 * Flow:
 *   1. Invoice marked paid (in Invoices page)
 *   2. User allocates it here using a budget rule  -> allocations land as 'allocated'
 *   3. User clicks "Mark Paid" on each allocation  -> allocation becomes 'paid'
 */

var BUDGET_CATEGORIES_UI = [
  'Tax Withheld', 'Tax To Pay', 'ACC Withheld', 'ACC To Pay',
  'Donate', 'Save', 'Invest', 'Spend'
];

var BUDGET_PCT_FIELDS = [
  'tax_withheld_pct', 'tax_to_pay_pct',
  'acc_withheld_pct', 'acc_to_pay_pct',
  'donate_pct', 'save_pct', 'invest_pct', 'spend_pct'
];

function renderBudgetPage(container) {
  container.innerHTML =
    '<div class="tab-bar" id="budget-tabs">' +
      '<button type="button" class="active" onclick="showBudgetTab(\'summary\')">Money Flow</button>' +
      '<button type="button" onclick="showBudgetTab(\'allocate\')">Allocate Invoice</button>' +
    '</div>' +
    '<div id="budget-tab-content"></div>';

  showBudgetTab('summary');
}

function showBudgetTab(tab) {
  var btns = document.querySelectorAll('#budget-tabs button');
  btns.forEach(function(btn, i) {
    btn.classList.toggle('active', (tab === 'summary' && i === 0) || (tab === 'allocate' && i === 1));
  });

  if (tab === 'summary') {
    renderBudgetSummary();
  } else {
    renderBudgetAllocate();
  }
}

// --- Budget Summary ---

function renderBudgetSummary() {
  var content = document.getElementById('budget-tab-content');

  var existingFrom = document.getElementById('budget-filter-from');
  var existingTo = document.getElementById('budget-filter-to');
  if (existingFrom && existingTo) {
    AppState.dateFrom = existingFrom.value;
    AppState.dateTo = existingTo.value;
  } else {
    var range = datePreset('6months');
    AppState.dateFrom = range.from;
    AppState.dateTo = range.to;
  }

  content.innerHTML =
    '<div class="filters">' +
      buildDateFilters('budget-filter-from', 'budget-filter-to', AppState.dateFrom, AppState.dateTo) +
      '<button type="button" class="btn-subtle" onclick="renderBudgetSummary()">Filter</button>' +
    '</div>' +
    '<p class="muted small" style="margin:-0.5rem 0 0.5rem;">Default: last 6 months</p>' +
    '<div id="budget-summary-body" aria-busy="true">Loading...</div>';

  serverCall('getBudgetSummary', { dateFrom: AppState.dateFrom, dateTo: AppState.dateTo }).then(function(summary) {
    var body = document.getElementById('budget-summary-body');
    var categories = (summary && summary.categories) || [];
    var totals = (summary && summary.totals) || {};

    var hasData = categories.some(function(c) { return c.items && c.items.length > 0; });
    if (!hasData) {
      body.innerHTML =
        '<article class="empty-state">' +
          '<h3>No allocations in this date range</h3>' +
          '<p>Mark an invoice as paid, then come here to allocate it.</p>' +
        '</article>';
      return;
    }

    var html = '';

    // --- Money flow overview (top-level tiles) ---
    html += '<section class="flow-overview">' +
      '<div class="flow-tile flow-tile--total">' +
        '<span class="flow-tile__label">Total allocated</span>' +
        '<span class="flow-tile__value">' + formatCurrency(totals.allocated) + '</span>' +
        '<span class="flow-tile__detail">across ' + categories.reduce(function(s, c){ return s + c.items.length; }, 0) + ' allocations</span>' +
      '</div>' +
      '<div class="flow-tile flow-tile--paid">' +
        '<span class="flow-tile__label">Moved / paid</span>' +
        '<span class="flow-tile__value">' + formatCurrency(totals.paid) + '</span>' +
        '<span class="flow-tile__detail">' + pctOf(totals.paid, totals.allocated) + ' of total</span>' +
      '</div>' +
      '<div class="flow-tile flow-tile--outstanding">' +
        '<span class="flow-tile__label">Still to move</span>' +
        '<span class="flow-tile__value">' + formatCurrency(totals.outstanding) + '</span>' +
        '<span class="flow-tile__detail">' + pctOf(totals.outstanding, totals.allocated) + ' of total</span>' +
      '</div>' +
    '</section>';

    // --- Tax & ACC at a glance ---
    html += '<section class="flow-group">' +
      '<h3 class="flow-group__title">Tax &amp; ACC</h3>' +
      '<div class="flow-grid">' +
        tileWithheldPaid('Tax withheld (at source)', totals.taxWithheld) +
        tileSplit('Tax to pay', totals.taxToPayAllocated, totals.taxToPayPaid, totals.taxToPayOutstanding) +
        tileWithheldPaid('ACC withheld (at source)', totals.accWithheld) +
        tileSplit('ACC to pay', totals.accToPayAllocated, totals.accToPayPaid, totals.accToPayOutstanding) +
      '</div>' +
    '</section>';

    // --- Per-category detail ---
    html += '<section class="flow-group">' +
      '<h3 class="flow-group__title">By category</h3>' +
      '<div class="category-list">';

    categories.forEach(function(cat) {
      if (!cat.items || cat.items.length === 0) return;
      html += renderCategoryBlock(cat);
    });

    html += '</div></section>';

    body.innerHTML = html;
  }).catch(function(err) {
    var body = document.getElementById('budget-summary-body');
    if (body) body.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function pctOf(part, total) {
  if (!total || total === 0) return '0%';
  return ((Number(part) / Number(total)) * 100).toFixed(0) + '%';
}

function tileWithheldPaid(label, amount) {
  return '<div class="mini-tile mini-tile--withheld">' +
    '<span class="mini-tile__label">' + escapeHtml(label) + '</span>' +
    '<span class="mini-tile__value">' + formatCurrency(amount || 0) + '</span>' +
    '<span class="mini-tile__detail">auto-paid</span>' +
  '</div>';
}

function tileSplit(label, allocated, paid, outstanding) {
  return '<div class="mini-tile mini-tile--split">' +
    '<span class="mini-tile__label">' + escapeHtml(label) + '</span>' +
    '<span class="mini-tile__value">' + formatCurrency(outstanding || 0) + '</span>' +
    '<span class="mini-tile__detail">outstanding</span>' +
    '<div class="mini-tile__bar">' +
      '<div class="mini-tile__bar-paid" style="width:' + pctOf(paid, allocated) + '"></div>' +
    '</div>' +
    '<div class="mini-tile__split">' +
      '<span>Paid ' + formatCurrency(paid || 0) + '</span>' +
      '<span>of ' + formatCurrency(allocated || 0) + '</span>' +
    '</div>' +
  '</div>';
}

function renderCategoryBlock(cat) {
  var isWithheld = cat.isWithheld;
  var barPct = pctOf(cat.paid, cat.allocated);

  var html = '<article class="category-block">' +
    '<header class="category-block__header">' +
      '<div>' +
        '<h4>' + escapeHtml(cat.category) + (isWithheld ? ' <span class="tag tag--auto">auto-paid</span>' : '') + '</h4>' +
        '<p class="muted">' + formatCurrency(cat.paid) + ' moved' +
          (!isWithheld ? ' · <strong>' + formatCurrency(cat.outstanding) + ' outstanding</strong>' : '') +
          ' · ' + formatCurrency(cat.allocated) + ' total' +
        '</p>' +
      '</div>' +
      '<div class="category-block__total">' + formatCurrency(cat.allocated) + '</div>' +
    '</header>' +
    '<div class="progress-bar"><div class="progress-bar__fill" style="width:' + barPct + '"></div></div>' +
    '<table class="data-table data-table--compact">' +
      '<thead><tr>' +
        '<th>Invoice</th><th>Source</th><th class="number">Amount</th>' +
        '<th>Status</th><th>Moved on</th><th>Note</th><th></th>' +
      '</tr></thead><tbody>';

  cat.items.forEach(function(item) {
    var status = item.status || 'allocated';
    html += '<tr>' +
      '<td><code>' + escapeHtml(item.invoice_id) + '</code></td>' +
      '<td>' + escapeHtml(item.business_name) + '</td>' +
      '<td class="number">' + formatCurrency(item.amount) + '</td>' +
      '<td><span class="badge badge-' + status + '">' + status + '</span></td>' +
      '<td>' + (item.transfer_date ? formatDate(item.transfer_date) : '<span class="muted">—</span>') + '</td>' +
      '<td>' + (item.notes ? escapeHtml(item.notes) : '<span class="muted">—</span>') + '</td>' +
      '<td class="actions">';

    if (!isWithheld) {
      if (status === 'allocated') {
        html += '<button type="button" class="btn-small btn-primary" onclick="markAllocationPaid(\'' + item.allocation_id + '\')">Mark Paid</button>';
      } else if (status === 'paid') {
        html += '<button type="button" class="btn-small btn-subtle" onclick="markAllocationUnpaid(\'' + item.allocation_id + '\')">Undo</button>';
      }
    }

    html += '</td></tr>';
  });
  html += '</tbody></table></article>';
  return html;
}

function markAllocationPaid(allocationId) {
  var note = prompt('Where did this go? (optional)');
  if (note === null) return;
  var params = allocationId + '|paid|' + todayStr() + '|' + (note || '');
  serverCall('updateAllocationStatusFromClient', params).then(function() {
    showToast('Marked as paid');
    renderBudgetSummary();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

function markAllocationUnpaid(allocationId) {
  serverCall('updateAllocationStatusFromClient', allocationId + '|allocated|').then(function() {
    showToast('Reverted to allocated');
    renderBudgetSummary();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

// --- Allocate Invoice ---

function renderBudgetAllocate() {
  var content = document.getElementById('budget-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading invoices...</div>';

  Promise.all([
    serverCall('getInvoicesWithDetails', { dateFrom: AppState.dateFrom, dateTo: AppState.dateTo }),
    serverCall('getAllClient', 'BudgetAllocations')
  ]).then(function(results) {
    var invoices = results[0] || [];
    var existingAllocs = results[1] || [];
    var rules = AppCache.budgetRules || [];

    var allocatedInvoiceIds = {};
    existingAllocs.forEach(function(a) { allocatedInvoiceIds[a.invoice_id] = true; });

    // Only paid invoices, not yet allocated
    var eligible = invoices.filter(function(inv) {
      return inv.status === 'paid' && !allocatedInvoiceIds[inv.invoice_id];
    });

    if (eligible.length === 0) {
      content.innerHTML =
        '<article class="empty-state">' +
          '<h3>Nothing to allocate</h3>' +
          '<p class="muted">Every paid invoice is already allocated. Mark a new invoice as paid in the Invoices tab to allocate it here.</p>' +
        '</article>';
      return;
    }

    if (rules.length === 0) {
      content.innerHTML =
        '<article class="empty-state">' +
          '<h3>No budget rules yet</h3>' +
          '<p class="muted">Add a budget rule under Settings → Budget Rules before allocating.</p>' +
        '</article>';
      return;
    }

    var defaultRule = rules.find(function(r) {
      return r.is_default === true || r.is_default === 'TRUE' || r.is_default === 'true';
    }) || rules[0];

    var invoiceOptions = eligible.map(function(inv) {
      return {
        id: inv.invoice_id,
        label: inv.invoice_id + ' — ' + inv.business_name + ' (' + formatCurrency(inv.total, inv.currency) + ')'
      };
    });

    var html =
      '<form id="allocate-form" class="form-card">' +
        '<div class="form-row">' +
          '<label>Invoice ' + buildSelect('ba-invoice', invoiceOptions, 'id', 'label', { required: true }) + '</label>' +
          '<label>Budget rule ' + buildSelect('ba-rule', rules, 'rule_id', 'name', { required: true, selected: defaultRule.rule_id, placeholder: false }) + '</label>' +
        '</div>' +
        '<div class="form-actions">' +
          '<button type="button" onclick="previewAllocation()">Preview allocation</button>' +
        '</div>' +
      '</form>' +
      '<div id="allocation-preview"></div>';

    content.innerHTML = html;
  }).catch(function(err) {
    content.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function previewAllocation() {
  var invoiceId = document.getElementById('ba-invoice').value;
  var ruleId = document.getElementById('ba-rule').value;

  if (!invoiceId || !ruleId) {
    showToast('Pick an invoice and a rule.', 'error');
    return;
  }

  var rule = (AppCache.budgetRules || []).find(function(r) { return r.rule_id === ruleId; });
  if (!rule) { showToast('Rule not found', 'error'); return; }

  var preview = document.getElementById('allocation-preview');
  preview.innerHTML = '<div aria-busy="true">Calculating...</div>';

  serverCall('getInvoiceDetails', invoiceId).then(function(data) {
    var total = Number(data.invoice.total) || 0;
    var currency = (data.business && data.business.currency) || 'NZD';

    var WITHHELD = ['Tax Withheld', 'ACC Withheld'];
    var OBLIGATIONS = ['Tax To Pay', 'ACC To Pay'];

    var withheldAmount = 0;
    BUDGET_CATEGORIES_UI.forEach(function(cat, i) {
      if (WITHHELD.indexOf(cat) !== -1) {
        withheldAmount += Math.round(total * (Number(rule[BUDGET_PCT_FIELDS[i]]) || 0) * 100) / 100;
      }
    });
    var adjusted = total - withheldAmount;

    var obligationAmount = 0;
    BUDGET_CATEGORIES_UI.forEach(function(cat, i) {
      if (OBLIGATIONS.indexOf(cat) !== -1) {
        obligationAmount += Math.round(adjusted * (Number(rule[BUDGET_PCT_FIELDS[i]]) || 0) * 100) / 100;
      }
    });
    var net = adjusted - obligationAmount;

    var html =
      '<article class="preview-card">' +
        '<header>' +
          '<h3>Preview</h3>' +
          '<p class="muted">' + escapeHtml(data.invoice.invoice_id) + ' · ' + escapeHtml((data.business && data.business.name) || '') +
            ' · Rule: <strong>' + escapeHtml(rule.name) + '</strong></p>' +
        '</header>' +
        '<div class="preview-numbers">' +
          '<div><span class="muted">Gross</span><strong>' + formatCurrency(total, currency) + '</strong></div>' +
          (withheldAmount > 0 ? '<div><span class="muted">Withheld (at source)</span><strong>&minus;' + formatCurrency(withheldAmount, currency) + '</strong></div>' : '') +
          '<div><span class="muted">Adjusted</span><strong>' + formatCurrency(adjusted, currency) + '</strong></div>' +
          (obligationAmount > 0 ? '<div><span class="muted">Obligations (Tax/ACC to pay)</span><strong>&minus;' + formatCurrency(obligationAmount, currency) + '</strong></div>' : '') +
          '<div><span class="muted">Net to distribute</span><strong>' + formatCurrency(net, currency) + '</strong></div>' +
        '</div>' +
        '<p class="muted" style="font-size:0.78rem;margin:0 0 0.5rem;">' +
          'Withheld categories are deducted from gross to give adjusted. ' +
          'Tax/ACC to pay are deducted from adjusted to give net. ' +
          'Distribution categories (Donate/Save/Invest/Spend) split the net.' +
        '</p>' +
        '<table class="data-table">' +
          '<thead><tr><th>Category</th><th class="number">%</th><th class="number">Amount</th><th>Note</th></tr></thead><tbody>';

    var allocTotal = 0;
    BUDGET_CATEGORIES_UI.forEach(function(cat, i) {
      var pct = Number(rule[BUDGET_PCT_FIELDS[i]]) || 0;
      var isWithheld = WITHHELD.indexOf(cat) !== -1;
      var isObligation = OBLIGATIONS.indexOf(cat) !== -1;
      var amount;
      var note;
      if (isWithheld) {
        amount = Math.round(total * pct * 100) / 100;
        note = 'From gross';
      } else if (isObligation) {
        amount = Math.round(adjusted * pct * 100) / 100;
        note = 'From adjusted';
      } else {
        amount = Math.round(net * pct * 100) / 100;
        note = 'From net';
      }
      allocTotal += amount;
      html += '<tr>' +
        '<td>' + escapeHtml(cat) + (isWithheld ? ' <span class="tag tag--auto">auto-paid</span>' : '') + '</td>' +
        '<td class="number">' + formatPercent(pct) + '</td>' +
        '<td class="number">' + formatCurrency(amount, currency) + '</td>' +
        '<td class="muted">' + note + '</td>' +
      '</tr>';
    });

    html += '<tr class="total-row"><td><strong>Total</strong></td><td></td>' +
      '<td class="number"><strong>' + formatCurrency(allocTotal, currency) + '</strong></td>' +
      '<td></td></tr>';
    html += '</tbody></table>' +
      '<div class="form-actions">' +
        '<button type="button" class="btn-primary" onclick="confirmAllocation()">Confirm allocation</button>' +
        '<button type="button" class="btn-subtle" onclick="document.getElementById(\'allocation-preview\').innerHTML=\'\'">Cancel</button>' +
      '</div>' +
    '</article>';

    preview.innerHTML = html;
  }).catch(function(err) {
    preview.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function confirmAllocation() {
  var invoiceId = document.getElementById('ba-invoice').value;
  var ruleId = document.getElementById('ba-rule').value;

  serverCall('allocateBudgetFromClient', invoiceId + '|' + ruleId).then(function() {
    showToast('Budget allocated');
    App.invalidate(['budget', 'dashboard']);
    showBudgetTab('summary');
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}
</script>
