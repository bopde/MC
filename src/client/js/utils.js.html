<script>
/**
 * Shared utility functions for the frontend.
 */

// Cache for reference data (businesses, codes, accounts, rules)
var AppCache = {
  businesses: null,
  workCodes: null,
  accounts: null,
  budgetRules: null,
  myDetails: null,

  clear: function() {
    this.businesses = null;
    this.workCodes = null;
    this.accounts = null;
    this.budgetRules = null;
    this.myDetails = null;
  }
};

/**
 * Wrapper around google.script.run for cleaner async calls.
 * Returns a Promise with a timeout to prevent hanging.
 */
function serverCall(functionName, args) {
  var TIMEOUT_MS = 15000; // 15 seconds

  return new Promise(function(resolve, reject) {
    var settled = false;
    var timer = setTimeout(function() {
      if (!settled) {
        settled = true;
        console.error('[serverCall] TIMEOUT after ' + TIMEOUT_MS + 'ms: ' + functionName);
        reject(new Error('Server call "' + functionName + '" timed out after ' + (TIMEOUT_MS / 1000) + 's'));
      }
    }, TIMEOUT_MS);

    var runner = google.script.run
      .withSuccessHandler(function(result) {
        if (!settled) {
          settled = true;
          clearTimeout(timer);
          console.log('[serverCall] OK: ' + functionName);
          resolve(result);
        }
      })
      .withFailureHandler(function(err) {
        if (!settled) {
          settled = true;
          clearTimeout(timer);
          console.error('[serverCall] FAIL: ' + functionName, err);
          reject(new Error(err.message || err));
        }
      });

    console.log('[serverCall] Calling: ' + functionName);
    if (args !== undefined) {
      runner[functionName](args);
    } else {
      runner[functionName]();
    }
  });
}

/**
 * Show a toast notification.
 */
function showToast(message, type) {
  type = type || 'success';
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

/**
 * Format a number as currency with the correct currency code.
 */
function formatCurrency(amount, currency) {
  currency = currency || 'NZD';
  try {
    return new Intl.NumberFormat('en-NZ', {
      style: 'currency',
      currency: currency
    }).format(amount || 0);
  } catch (e) {
    // Fallback for unknown currency codes
    return currency + ' ' + (Number(amount) || 0).toFixed(2);
  }
}

/**
 * Format a date string for display.
 */
function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  return d.toLocaleDateString('en-NZ', { year: 'numeric', month: 'short', day: 'numeric' });
}

/**
 * Format a number as percentage.
 */
function formatPercent(value) {
  return (Number(value) * 100).toFixed(1) + '%';
}

/**
 * Generate an HTML <select> from an array of items.
 */
function buildSelect(id, items, valueField, labelField, options) {
  options = options || {};
  var html = '<select id="' + id + '" name="' + id + '"' +
             (options.required ? ' required' : '') + '>';
  if (options.placeholder !== false) {
    html += '<option value="">' + (options.placeholder || 'Select...') + '</option>';
  }
  items.forEach(function(item) {
    var selected = options.selected === item[valueField] ? ' selected' : '';
    html += '<option value="' + escapeHtml(item[valueField]) + '"' + selected + '>' +
            escapeHtml(item[labelField]) + '</option>';
  });
  html += '</select>';
  return html;
}

/**
 * Escape HTML entities.
 */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/**
 * Load reference data into cache. Returns a promise.
 * Each call is wrapped so a single failure won't block everything.
 */
function loadReferenceData() {
  console.log('[loadReferenceData] Starting...');

  function safeLoad(name, serverFn, fallback) {
    return serverCall(serverFn).then(function(data) {
      AppCache[name] = data;
      console.log('[loadReferenceData] Loaded ' + name + ':', (data || []).length || 'ok');
    }).catch(function(err) {
      console.warn('[loadReferenceData] Failed to load ' + name + ', using fallback:', err.message);
      AppCache[name] = fallback;
    });
  }

  var promises = [];
  if (!AppCache.businesses) promises.push(safeLoad('businesses', 'getBusinesses', []));
  if (!AppCache.workCodes) promises.push(safeLoad('workCodes', 'getWorkCodes', []));
  if (!AppCache.accounts) promises.push(safeLoad('accounts', 'getAccounts', []));
  if (!AppCache.budgetRules) promises.push(safeLoad('budgetRules', 'getBudgetRules', []));
  if (!AppCache.myDetails) promises.push(safeLoad('myDetails', 'getMyDetails', {}));

  return Promise.all(promises).then(function() {
    console.log('[loadReferenceData] All done.');
  });
}

/**
 * Get today's date as YYYY-MM-DD.
 */
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

/**
 * Get current month as YYYY-MM.
 */
function currentMonth() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

/**
 * Look up the currency for a business by ID.
 */
function getCurrencyForBusiness(businessId) {
  if (!AppCache.businesses) return 'NZD';
  var biz = AppCache.businesses.find(function(b) { return b.business_id === businessId; });
  return (biz && biz.currency) || 'NZD';
}

/**
 * Build a work code select that shows "CODE - Description".
 */
function buildCodeSelect(id, codes, options) {
  options = options || {};
  var items = (codes || []).map(function(c) {
    return { value: c.code_id, label: c.code_id + ' - ' + c.description };
  });
  return buildSelect(id, items, 'value', 'label', options);
}
</script>
