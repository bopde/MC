<script>
/**
 * Shared utility functions for the frontend.
 */

var MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Cache for reference data
var AppCache = {
  businesses: null,
  workCodes: null,
  accounts: null,
  budgetRules: null,
  myDetails: null,

  clear: function() {
    this.businesses = null;
    this.workCodes = null;
    this.accounts = null;
    this.budgetRules = null;
    this.myDetails = null;
  }
};

/**
 * Promise wrapper around google.script.run with a timeout.
 */
function serverCall(functionName, args) {
  var TIMEOUT_MS = 20000;

  return new Promise(function(resolve, reject) {
    var settled = false;
    var timer = setTimeout(function() {
      if (!settled) {
        settled = true;
        console.error('[serverCall] TIMEOUT: ' + functionName);
        reject(new Error('Server call "' + functionName + '" timed out after ' + (TIMEOUT_MS / 1000) + 's'));
      }
    }, TIMEOUT_MS);

    var runner = google.script.run
      .withSuccessHandler(function(result) {
        if (!settled) {
          settled = true;
          clearTimeout(timer);
          resolve(result);
        }
      })
      .withFailureHandler(function(err) {
        if (!settled) {
          settled = true;
          clearTimeout(timer);
          console.error('[serverCall] FAIL: ' + functionName, err);
          reject(new Error(err.message || err));
        }
      });

    if (args !== undefined) {
      runner[functionName](args);
    } else {
      runner[functionName]();
    }
  });
}

/**
 * Show a toast notification.
 */
function showToast(message, type) {
  type = type || 'success';
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

/**
 * Format a number as currency with the correct currency code.
 */
function formatCurrency(amount, currency) {
  currency = currency || 'NZD';
  try {
    return new Intl.NumberFormat('en-NZ', {
      style: 'currency',
      currency: currency
    }).format(amount || 0);
  } catch (e) {
    return currency + ' ' + (Number(amount) || 0).toFixed(2);
  }
}

/**
 * Format a date as "dd.mmm.yy" (e.g. "12.Apr.26").
 * Accepts Date objects, ISO strings, or "YYYY-MM-DD" strings.
 */
function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = (dateStr instanceof Date) ? dateStr : new Date(dateStr);
  if (isNaN(d.getTime())) return String(dateStr);
  var day = String(d.getDate()).padStart(2, '0');
  var mon = MONTHS_SHORT[d.getMonth()];
  var yr = String(d.getFullYear()).slice(-2);
  return day + '.' + mon + '.' + yr;
}

/**
 * Format a month as "mmm.yy" (e.g. "Apr.26"). Accepts "YYYY-MM" or ISO strings.
 */
function formatMonth(monthStr) {
  if (!monthStr) return '';
  var str = String(monthStr);
  var m = str.match(/^(\d{4})-(\d{1,2})/);
  if (m) {
    var yr = m[1].slice(-2);
    var mon = MONTHS_SHORT[parseInt(m[2], 10) - 1];
    return mon + '.' + yr;
  }
  var d = new Date(str);
  if (!isNaN(d.getTime())) {
    return MONTHS_SHORT[d.getMonth()] + '.' + String(d.getFullYear()).slice(-2);
  }
  return str;
}

/**
 * Extract YYYY-MM from a month value (handles ISO strings).
 */
function normalizeMonth(val) {
  if (!val) return '';
  var str = String(val);
  var m = str.match(/^(\d{4})-(\d{1,2})/);
  if (m) {
    var mm = parseInt(m[2], 10);
    return m[1] + '-' + (mm < 10 ? '0' + mm : '' + mm);
  }
  return str;
}

/**
 * Format a number as a percentage.
 */
function formatPercent(value) {
  return (Number(value) * 100).toFixed(1) + '%';
}

/**
 * Generate an HTML <select> from an array of items.
 */
function buildSelect(id, items, valueField, labelField, options) {
  options = options || {};
  var html = '<select id="' + id + '" name="' + id + '"' +
             (options.required ? ' required' : '') + '>';
  if (options.placeholder !== false) {
    html += '<option value="">' + (options.placeholder || 'Select...') + '</option>';
  }
  items.forEach(function(item) {
    var selected = options.selected === item[valueField] ? ' selected' : '';
    html += '<option value="' + escapeHtml(item[valueField]) + '"' + selected + '>' +
            escapeHtml(item[labelField]) + '</option>';
  });
  html += '</select>';
  return html;
}

/**
 * Escape HTML entities.
 */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/**
 * Load all reference data via a single bootstrap RPC.
 * Massive speedup over 5 separate calls.
 */
function loadReferenceData() {
  return serverCall('bootstrap').then(function(data) {
    AppCache.businesses = data.businesses || [];
    AppCache.workCodes = data.workCodes || [];
    AppCache.accounts = data.accounts || [];
    AppCache.budgetRules = data.budgetRules || [];
    AppCache.myDetails = data.myDetails || {};
  }).catch(function(err) {
    console.warn('[bootstrap] Failed, falling back to empty cache:', err.message);
    AppCache.businesses = AppCache.businesses || [];
    AppCache.workCodes = AppCache.workCodes || [];
    AppCache.accounts = AppCache.accounts || [];
    AppCache.budgetRules = AppCache.budgetRules || [];
    AppCache.myDetails = AppCache.myDetails || {};
    throw err;
  });
}

/**
 * Get today's date as YYYY-MM-DD.
 */
function todayStr() {
  var d = new Date();
  var mo = String(d.getMonth() + 1).padStart(2, '0');
  var da = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + mo + '-' + da;
}

/**
 * Get current month as YYYY-MM.
 */
function currentMonth() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

/**
 * Look up the currency for a business by ID.
 */
function getCurrencyForBusiness(businessId) {
  if (!AppCache.businesses) return 'NZD';
  var biz = AppCache.businesses.find(function(b) { return b.business_id === businessId; });
  return (biz && biz.currency) || 'NZD';
}

/**
 * Build a work code select that shows "CODE - Description".
 */
function buildCodeSelect(id, codes, options) {
  options = options || {};
  var items = (codes || []).map(function(c) {
    return { value: c.code_id, label: c.code_id + ' - ' + c.description };
  });
  return buildSelect(id, items, 'value', 'label', options);
}
</script>
