<script>
/**
 * Account Summaries module.
 * - Monthly balance entry across all accounts
 * - Year overview: compact matrix of balances + monthly deltas
 *
 * Months are normalised client-side so Sheets' Date coercion ("2026-04"
 * -> Date object -> ISO string) can't break lookups.
 */

function renderAccountsPage(container) {
  container.innerHTML =
    '<div class="tab-bar" id="account-tabs">' +
      '<button class="active" onclick="showAccountTab(\'monthly\')">Monthly Entry</button>' +
      '<button onclick="showAccountTab(\'overview\')">Year Overview</button>' +
    '</div>' +
    '<div id="account-tab-content"></div>';

  showAccountTab('monthly');
}

function showAccountTab(tab) {
  var btns = document.querySelectorAll('#account-tabs button');
  btns.forEach(function(btn, i) {
    btn.classList.toggle('active', (tab === 'monthly' && i === 0) || (tab === 'overview' && i === 1));
  });

  if (tab === 'monthly') {
    renderMonthlySummary();
  } else {
    renderYearOverview();
  }
}

// --- Monthly Summary Entry ---

function renderMonthlySummary() {
  var content = document.getElementById('account-tab-content');

  content.innerHTML =
    '<div class="filters">' +
      '<label>Month <input type="month" id="as-month" value="' + currentMonth() + '" onchange="loadMonthlySummaries()"></label>' +
      '<button class="btn-subtle" onclick="loadMonthlySummaries()">Reload</button>' +
    '</div>' +
    '<div id="monthly-summaries"><div aria-busy="true">Loading...</div></div>';

  loadMonthlySummaries();
}

function loadMonthlySummaries() {
  var month = document.getElementById('as-month').value;
  if (!month) return;
  month = normalizeMonth(month);

  var el = document.getElementById('monthly-summaries');
  el.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getAccountSummariesForMonth', month).then(function(data) {
    var accounts = AppCache.accounts || [];
    var currentArr = data.current || data || [];
    var previousArr = data.previous || [];

    var summaryMap = {};
    (Array.isArray(currentArr) ? currentArr : []).forEach(function(s) {
      summaryMap[s.account_id] = s;
    });
    var prevMap = {};
    previousArr.forEach(function(s) {
      prevMap[s.account_id] = s;
    });

    if (accounts.length === 0) {
      el.innerHTML = '<article class="empty-state"><h3>No accounts configured</h3>' +
        '<p class="muted">Add accounts in Settings first.</p></article>';
      return;
    }

    function prevHint(prev, field, cur) {
      var v = prev[field];
      if (v == null || v === '') return '';
      return '<div class="muted small">last: ' + formatCurrency(Number(v), cur) + '</div>';
    }
    function inputVal(s, field) {
      return (s[field] != null && s[field] !== '') ? s[field] : '';
    }

    var html =
      '<form id="monthly-form" onsubmit="saveMonthlySummaries(event)">';

    accounts.forEach(function(acc) {
      var s = summaryMap[acc.account_id] || {};
      var prev = prevMap[acc.account_id] || {};
      var cur = acc.currency || 'NZD';

      html += '<article class="account-entry-card" data-account-id="' + acc.account_id + '">' +
        '<header><h4 style="margin:0;">' + escapeHtml(acc.name) + '</h4>' +
        '<span class="muted small">' + escapeHtml(acc.type) + ' · ' + escapeHtml(cur) + '</span></header>' +
        '<div class="form-row">' +
          '<label>Balance <input type="number" step="0.01" class="as-balance" value="' + inputVal(s, 'ending_balance') + '">' + prevHint(prev, 'ending_balance', cur) + '</label>' +
          '<label>Realised gains <input type="number" step="0.01" class="as-realised" value="' + inputVal(s, 'realised_gains') + '">' + prevHint(prev, 'realised_gains', cur) + '</label>' +
          '<label>Unrealised gains <input type="number" step="0.01" class="as-unrealised" value="' + inputVal(s, 'unrealised_gains') + '">' + prevHint(prev, 'unrealised_gains', cur) + '</label>' +
        '</div>' +
        '<div class="form-row">' +
          '<label>Tax paid <input type="number" step="0.01" class="as-tax" value="' + inputVal(s, 'tax_paid') + '">' + prevHint(prev, 'tax_paid', cur) + '</label>' +
          '<label>Total in <input type="number" step="0.01" class="as-total-in" value="' + inputVal(s, 'total_in') + '">' + prevHint(prev, 'total_in', cur) + '</label>' +
          '<label>Total out <input type="number" step="0.01" class="as-total-out" value="' + inputVal(s, 'total_out') + '">' + prevHint(prev, 'total_out', cur) + '</label>' +
        '</div>' +
        '<label>Notes <input type="text" class="as-notes" value="' + escapeHtml(s.notes || '') + '"></label>' +
      '</article>';
    });

    html += '<div class="form-actions">' +
        '<button type="submit">Save all</button>' +
        '<span class="muted" id="save-status"></span>' +
      '</div></form>';

    el.innerHTML = html;
  }).catch(function(err) {
    el.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function saveMonthlySummaries(event) {
  event.preventDefault();
  var month = normalizeMonth(document.getElementById('as-month').value);
  var cards = document.querySelectorAll('#monthly-form .account-entry-card');
  var promises = [];
  var saving = 0;

  cards.forEach(function(card) {
    var balance = card.querySelector('.as-balance').value;
    var realised = card.querySelector('.as-realised').value;
    var unrealised = card.querySelector('.as-unrealised').value;
    var tax = card.querySelector('.as-tax').value;
    var totalIn = card.querySelector('.as-total-in').value;
    var totalOut = card.querySelector('.as-total-out').value;
    var notes = card.querySelector('.as-notes').value;

    if (balance === '' && realised === '' && unrealised === '' && tax === '' && totalIn === '' && totalOut === '' && !notes) return;

    saving++;
    promises.push(serverCall('saveAccountSummary', {
      account_id: card.dataset.accountId,
      month: month,
      ending_balance: balance || 0,
      realised_gains: realised || 0,
      unrealised_gains: unrealised || 0,
      tax_paid: tax || 0,
      total_in: totalIn || 0,
      total_out: totalOut || 0,
      notes: notes || ''
    }));
  });

  var status = document.getElementById('save-status');
  if (saving === 0) {
    if (status) status.textContent = 'Nothing to save.';
    return;
  }
  if (status) status.textContent = 'Saving ' + saving + '...';

  Promise.all(promises).then(function() {
    showToast('Saved ' + saving + ' account row' + (saving === 1 ? '' : 's'));
    if (status) status.textContent = 'Saved.';
    App.invalidate(['accounts']);
  }).catch(function(err) {
    showToast(err.message, 'error');
    if (status) status.textContent = '';
  });
}

// --- Year Overview ---

function renderYearOverview() {
  var content = document.getElementById('account-tab-content');
  var year = new Date().getFullYear().toString();

  content.innerHTML =
    '<div class="filters">' +
      '<label>Year <input type="number" id="ao-year" value="' + year + '" min="2020" max="2099" onchange="loadYearOverview()"></label>' +
      '<button class="btn-subtle" onclick="loadYearOverview()">Reload</button>' +
    '</div>' +
    '<div id="year-overview"><div aria-busy="true">Loading...</div></div>';

  loadYearOverview();
}

function loadYearOverview() {
  var year = document.getElementById('ao-year').value;
  var el = document.getElementById('year-overview');
  el.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getYearOverview', year).then(function(data) {
    var accounts = data.accounts || [];
    var summaries = (data.summaries || []).map(function(s) {
      s.month = normalizeMonth(s.month);
      return s;
    });

    if (accounts.length === 0) {
      el.innerHTML = '<article class="empty-state"><h3>No accounts configured</h3>' +
        '<p class="muted">Add accounts in Settings first.</p></article>';
      return;
    }

    // Build months array: Jan of year through Mar of next year (15 months)
    var months = [];
    for (var m = 1; m <= 12; m++) {
      months.push(year + '-' + String(m).padStart(2, '0'));
    }
    var nextYear = (parseInt(year) + 1).toString();
    for (var m2 = 1; m2 <= 3; m2++) {
      months.push(nextYear + '-' + String(m2).padStart(2, '0'));
    }

    // Index summaries by account_id|month
    var sMap = {};
    summaries.forEach(function(s) {
      sMap[s.account_id + '|' + s.month] = s;
    });

    // --- Group totals tile ---
    var totalByCurrency = {};
    var latestByAccount = {};
    accounts.forEach(function(acc) {
      // Latest = most recent non-empty balance in the selected window
      for (var i = months.length - 1; i >= 0; i--) {
        var s = sMap[acc.account_id + '|' + months[i]];
        if (s && s.ending_balance !== '' && s.ending_balance !== null && s.ending_balance !== undefined) {
          latestByAccount[acc.account_id] = { month: months[i], balance: Number(s.ending_balance) };
          break;
        }
      }
    });
    accounts.forEach(function(acc) {
      var latest = latestByAccount[acc.account_id];
      if (!latest) return;
      var cur = acc.currency || 'NZD';
      totalByCurrency[cur] = (totalByCurrency[cur] || 0) + latest.balance;
    });

    // Compute total in/out across all accounts by currency
    var inflowByCurrency = {};
    var outflowByCurrency = {};
    accounts.forEach(function(acc) {
      var cur = acc.currency || 'NZD';
      var prevBal = null;
      months.forEach(function(mo) {
        var s = sMap[acc.account_id + '|' + mo];
        if (!s || s.ending_balance === '' || s.ending_balance === null || s.ending_balance === undefined) return;
        var bal = Number(s.ending_balance);
        if (prevBal !== null) {
          var diff = bal - prevBal;
          if (diff > 0) inflowByCurrency[cur] = (inflowByCurrency[cur] || 0) + diff;
          else if (diff < 0) outflowByCurrency[cur] = (outflowByCurrency[cur] || 0) + Math.abs(diff);
        }
        prevBal = bal;
      });
    });

    var html = '';

    // Top-level totals
    html += '<section class="flow-overview">';
    Object.keys(totalByCurrency).forEach(function(cur) {
      html += '<div class="flow-tile flow-tile--total">' +
        '<span class="flow-tile__label">Total ' + escapeHtml(cur) + ' (latest)</span>' +
        '<span class="flow-tile__value">' + formatCurrency(totalByCurrency[cur], cur) + '</span>' +
        '<span class="flow-tile__detail">across ' + accounts.filter(function(a){ return (a.currency||'NZD') === cur && latestByAccount[a.account_id]; }).length + ' accounts</span>' +
      '</div>';
      html += '<div class="flow-tile flow-tile--paid">' +
        '<span class="flow-tile__label">Total in (' + escapeHtml(cur) + ')</span>' +
        '<span class="flow-tile__value">' + formatCurrency(inflowByCurrency[cur] || 0, cur) + '</span>' +
        '<span class="flow-tile__detail">net increases across months</span>' +
      '</div>';
      html += '<div class="flow-tile flow-tile--outstanding">' +
        '<span class="flow-tile__label">Total out (' + escapeHtml(cur) + ')</span>' +
        '<span class="flow-tile__value">' + formatCurrency(outflowByCurrency[cur] || 0, cur) + '</span>' +
        '<span class="flow-tile__detail">net decreases across months</span>' +
      '</div>';
    });
    html += '</section>';

    // --- Combined matrix ---
    html += '<article>' +
      '<header><h3 style="margin:0;">Balances · ' + year + ' → ' + nextYear.slice(-2) + '</h3>' +
      '<p class="muted" style="margin:0.25rem 0 0;">End-of-month balance per account. Coloured deltas show change vs previous month.</p></header>' +
      '<div class="scroll-x">' +
      '<table class="data-table data-table--matrix"><thead><tr>' +
        '<th class="sticky-col">Account</th>';
    months.forEach(function(mo) {
      html += '<th class="number">' + formatMonth(mo) + '</th>';
    });
    html += '<th class="number">Latest</th></tr></thead><tbody>';

    accounts.forEach(function(acc) {
      var cur = acc.currency || 'NZD';
      html += '<tr>' +
        '<td class="sticky-col"><strong>' + escapeHtml(acc.name) + '</strong>' +
        ' <small class="muted">' + escapeHtml(acc.type) + ' · ' + escapeHtml(cur) + '</small></td>';

      var prevBalance = null;
      months.forEach(function(mo) {
        var s = sMap[acc.account_id + '|' + mo];
        if (!s || s.ending_balance === '' || s.ending_balance === null || s.ending_balance === undefined) {
          html += '<td class="number muted">—</td>';
          return;
        }
        var balance = Number(s.ending_balance);
        var deltaHtml = '';
        if (prevBalance !== null) {
          var diff = balance - prevBalance;
          if (Math.abs(diff) > 0.005) {
            var cls = diff >= 0 ? 'delta delta--up' : 'delta delta--down';
            var sign = diff >= 0 ? '+' : '';
            deltaHtml = '<div class="' + cls + '">' + sign + formatCurrency(diff, cur) + '</div>';
          }
        }
        html += '<td class="number"><div class="cell-balance">' + formatCurrency(balance, cur) + '</div>' + deltaHtml + '</td>';
        prevBalance = balance;
      });

      var latest = latestByAccount[acc.account_id];
      html += '<td class="number"><strong>' +
        (latest ? formatCurrency(latest.balance, cur) : '—') +
        '</strong>' +
        (latest ? '<div class="muted small">' + formatMonth(latest.month) + '</div>' : '') +
      '</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div></article>';

    // --- Per-account detail (gains/tax) ---
    html += '<article>' +
      '<header><h3 style="margin:0;">Gains &amp; tax detail</h3>' +
      '<p class="muted" style="margin:0.25rem 0 0;">Realised, unrealised, and tax paid per month.</p></header>';

    accounts.forEach(function(acc) {
      var cur = acc.currency || 'NZD';
      var hasAny = months.some(function(mo){
        var s = sMap[acc.account_id + '|' + mo];
        return s && (Number(s.realised_gains) || Number(s.unrealised_gains) || Number(s.tax_paid));
      });
      if (!hasAny) return;

      html += '<h4 class="section-label">' + escapeHtml(acc.name) + ' <small class="muted">(' + escapeHtml(cur) + ')</small></h4>' +
        '<div class="scroll-x"><table class="data-table data-table--compact">' +
        '<thead><tr><th>Month</th><th class="number">Realised</th><th class="number">Unrealised</th>' +
        '<th class="number">Tax paid</th><th>Notes</th></tr></thead><tbody>';

      var rTot = 0, uTot = 0, tTot = 0;
      months.forEach(function(mo) {
        var s = sMap[acc.account_id + '|' + mo];
        if (!s) return;
        var r = Number(s.realised_gains) || 0;
        var u = Number(s.unrealised_gains) || 0;
        var t = Number(s.tax_paid) || 0;
        if (r === 0 && u === 0 && t === 0 && !s.notes) return;
        rTot += r; uTot += u; tTot += t;
        html += '<tr>' +
          '<td>' + formatMonth(mo) + '</td>' +
          '<td class="number">' + (r ? formatCurrency(r, cur) : '<span class="muted">—</span>') + '</td>' +
          '<td class="number">' + (u ? formatCurrency(u, cur) : '<span class="muted">—</span>') + '</td>' +
          '<td class="number">' + (t ? formatCurrency(t, cur) : '<span class="muted">—</span>') + '</td>' +
          '<td>' + escapeHtml(s.notes || '') + '</td>' +
          '</tr>';
      });
      html += '<tr class="total-row"><td><strong>Total</strong></td>' +
        '<td class="number"><strong>' + formatCurrency(rTot, cur) + '</strong></td>' +
        '<td class="number"><strong>' + formatCurrency(uTot, cur) + '</strong></td>' +
        '<td class="number"><strong>' + formatCurrency(tTot, cur) + '</strong></td>' +
        '<td></td></tr>';
      html += '</tbody></table></div>';
    });

    html += '</article>';

    el.innerHTML = html;
  }).catch(function(err) {
    el.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}
</script>
