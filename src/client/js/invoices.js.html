<script>
/**
 * Invoices module.
 * - Create invoices from uninvoiced time entries and expenses
 * - View invoice list with status management
 * - Edit invoice metadata (description, notes, GST)
 * - Print-friendly invoice view with "From" details
 */

function renderInvoicesPage(container) {
  container.innerHTML =
    '<div class="tab-bar" id="invoice-tabs">' +
      '<button class="active" onclick="showInvoiceTab(\'list\')">All Invoices</button>' +
      '<button onclick="showInvoiceTab(\'create\')">Create Invoice</button>' +
    '</div>' +
    '<div id="invoice-tab-content"></div>';

  showInvoiceTab('list');
}

function showInvoiceTab(tab) {
  var btns = document.querySelectorAll('#invoice-tabs button');
  btns.forEach(function(btn, i) {
    btn.classList.toggle('active', (tab === 'list' && i === 0) || (tab === 'create' && i === 1));
  });
  if (tab === 'list') renderInvoiceList();
  else renderCreateInvoice();
}

// --- Invoice List ---

function renderInvoiceList() {
  var content = document.getElementById('invoice-tab-content');
  var year = AppState.year;

  content.innerHTML =
    '<div class="filters">' +
      '<label>Year ' + buildYearSelect('inv-filter-year', year) + '</label>' +
      '<button class="btn-subtle" onclick="renderInvoiceList()">Filter</button>' +
    '</div>' +
    '<div id="invoice-list-body" aria-busy="true">Loading invoices...</div>';

  var yearEl = document.getElementById('inv-filter-year');
  if (yearEl) { year = yearEl.value; AppState.year = year; }

  serverCall('getInvoicesWithDetails', year).then(function(invoices) {
    var body = document.getElementById('invoice-list-body');
    if (!invoices || invoices.length === 0) {
      body.innerHTML = '<p class="muted">No invoices for ' + year + '. Create one from the "Create Invoice" tab.</p>';
      return;
    }

    invoices.sort(function(a, b) { return new Date(b.created_date) - new Date(a.created_date); });

    var html = '<div class="scroll-x"><table class="data-table"><thead><tr>' +
      '<th>Invoice #</th><th>Business</th><th>Period</th><th>Created</th>' +
      '<th class="number">Subtotal</th><th class="number">GST</th>' +
      '<th class="number">Total</th><th>Status</th><th>Actions</th>' +
      '</tr></thead><tbody>';

    invoices.forEach(function(inv) {
      var cur = inv.currency || 'NZD';
      html += '<tr>' +
        '<td><strong>' + escapeHtml(inv.invoice_id) + '</strong></td>' +
        '<td>' + escapeHtml(inv.business_name) + '</td>' +
        '<td>' + formatDate(inv.date_from) + ' &rarr; ' + formatDate(inv.date_to) + '</td>' +
        '<td>' + formatDate(inv.created_date) + '</td>' +
        '<td class="number">' + formatCurrency(inv.subtotal, cur) + '</td>' +
        '<td class="number">' + (Number(inv.gst_amount) ? formatCurrency(inv.gst_amount, cur) : '&mdash;') + '</td>' +
        '<td class="number"><strong>' + formatCurrency(inv.total, cur) + '</strong></td>' +
        '<td><span class="badge badge-' + escapeHtml(inv.status) + '">' + escapeHtml(inv.status) + '</span></td>' +
        '<td class="actions">' +
          '<button class="btn-small" onclick="viewInvoice(\'' + inv.invoice_id + '\')">View</button> ' +
          buildStatusButton(inv) +
        '</td>' +
        '</tr>';
    });

    html += '</tbody></table></div>';
    body.innerHTML = html;
  }).catch(function(err) {
    var body = document.getElementById('invoice-list-body');
    if (body) body.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function buildStatusButton(inv) {
  var html = '';
  if (inv.status === 'draft') {
    html += '<button class="btn-small" onclick="changeInvoiceStatus(\'' + inv.invoice_id + '\', \'sent\')">Mark Sent</button> ';
    html += '<button class="btn-small btn-subtle" onclick="voidInvoice(\'' + inv.invoice_id + '\')">Void</button>';
  } else if (inv.status === 'sent') {
    html += '<button class="btn-small btn-primary" onclick="changeInvoiceStatus(\'' + inv.invoice_id + '\', \'paid\')">Mark Paid</button> ';
    html += '<button class="btn-small btn-subtle" onclick="voidInvoice(\'' + inv.invoice_id + '\')">Void</button>';
  } else if (inv.status === 'paid') {
    html += '<button class="btn-small btn-subtle" onclick="voidInvoice(\'' + inv.invoice_id + '\')">Void</button>';
  }
  return html;
}

function changeInvoiceStatus(invoiceId, newStatus) {
  serverCall('updateInvoiceStatusFromClient', invoiceId + '|' + newStatus).then(function() {
    showToast('Invoice marked as ' + newStatus);
    renderInvoiceList();
    App.invalidate(['budget']);
  }).catch(function(err) { showToast(err.message, 'error'); });
}

function voidInvoice(invoiceId) {
  if (!confirm('Void this invoice? Time entries and expenses will be unlinked so they can be re-invoiced.')) return;
  serverCall('updateInvoiceStatusFromClient', invoiceId + '|void').then(function() {
    showToast('Invoice voided');
    renderInvoiceList();
    App.invalidate(['hours', 'budget']);
  }).catch(function(err) { showToast(err.message, 'error'); });
}

function viewInvoice(invoiceId) {
  var content = document.getElementById('invoice-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading invoice...</div>';
  serverCall('getInvoiceDetails', invoiceId).then(function(data) {
    renderInvoiceDetail(data);
  }).catch(function(err) {
    content.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function renderInvoiceDetail(data) {
  var inv = data.invoice;
  var biz = data.business || {};
  var my = data.myDetails || {};
  var currency = biz.currency || 'NZD';
  var content = document.getElementById('invoice-tab-content');
  var includeGst = inv.include_gst === true || inv.include_gst === 'true' || inv.include_gst === 'TRUE';

  var canEdit = inv.status !== 'paid' && inv.status !== 'void';

  var html =
    '<div class="no-print invoice-toolbar">' +
      '<button class="btn-subtle" onclick="showInvoiceTab(\'list\')">&larr; Back</button> ' +
      (canEdit ? '<button class="btn-subtle" onclick="editInvoice(\'' + inv.invoice_id + '\')">Edit</button> ' : '') +
      '<button onclick="window.print()">Print / Save PDF</button>' +
    '</div>' +

    '<article class="invoice-print">' +
      '<header class="invoice-header">' +
        '<div>' +
          '<h2 class="invoice-title">INVOICE</h2>' +
          '<p class="invoice-id">' + escapeHtml(inv.invoice_id) + '</p>' +
        '</div>' +
        '<div class="invoice-meta">' +
          '<div><span class="label">Date:</span> ' + formatDate(inv.created_date) + '</div>' +
          '<div><span class="label">Period:</span> ' + formatDate(inv.date_from) + ' &ndash; ' + formatDate(inv.date_to) + '</div>' +
          '<div><span class="label">Status:</span> <span class="badge badge-' + escapeHtml(inv.status) + '">' + escapeHtml(inv.status) + '</span></div>' +
        '</div>' +
      '</header>' +

      '<div class="invoice-parties">' +
        '<div>' +
          '<div class="party-label">From</div>' +
          '<div class="party-name">' + escapeHtml(my.business_name || '') + '</div>' +
          (my.contact_name ? '<div>' + escapeHtml(my.contact_name) + '</div>' : '') +
          (my.email ? '<div>' + escapeHtml(my.email) + '</div>' : '') +
          (my.phone ? '<div>' + escapeHtml(my.phone) + '</div>' : '') +
          (my.address ? '<div>' + escapeHtml(my.address).replace(/\n/g, '<br>') + '</div>' : '') +
          (my.tax_number ? '<div class="muted">Tax #: ' + escapeHtml(my.tax_number) + '</div>' : '') +
          (my.gst_number ? '<div class="muted">GST #: ' + escapeHtml(my.gst_number) + '</div>' : '') +
        '</div>' +
        '<div class="party-right">' +
          '<div class="party-label">Bill To</div>' +
          '<div class="party-name">' + escapeHtml(biz.name || '') + '</div>' +
          (biz.contact_name ? '<div>' + escapeHtml(biz.contact_name) + '</div>' : '') +
          (biz.email ? '<div>' + escapeHtml(biz.email) + '</div>' : '') +
          (biz.address ? '<div>' + escapeHtml(biz.address).replace(/\n/g, '<br>') + '</div>' : '') +
        '</div>' +
      '</div>';

  if (inv.description) {
    html += '<div class="invoice-description"><em>' + escapeHtml(inv.description) + '</em></div>';
  }

  if (data.codeGroups && data.codeGroups.length > 0) {
    html += '<h4 class="section-label">Services</h4>' +
      '<table class="invoice-table"><thead><tr>' +
        '<th>Code</th><th>Description</th><th class="number">Hours</th>' +
        '<th class="number">Rate</th><th class="number">Amount</th>' +
      '</tr></thead><tbody>';

    data.codeGroups.forEach(function(group) {
      var codeDesc = group.description || '';
      if (!codeDesc && AppCache.workCodes) {
        var wc = AppCache.workCodes.find(function(c) { return c.code_id === group.code; });
        if (wc) codeDesc = wc.description;
      }
      if (!codeDesc) codeDesc = group.code;
      html += '<tr>' +
        '<td>' + escapeHtml(group.code) + '</td>' +
        '<td>' + escapeHtml(codeDesc) + '</td>' +
        '<td class="number">' + group.totalHours.toFixed(2) + '</td>' +
        '<td class="number">' + formatCurrency(group.rate, currency) + '</td>' +
        '<td class="number">' + formatCurrency(group.totalAmount, currency) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
  }

  if (data.expenses && data.expenses.length > 0) {
    html += '<h4 class="section-label">Expenses</h4>' +
      '<table class="invoice-table"><thead><tr>' +
        '<th>Date</th><th>Code</th><th>Description</th><th class="number">Amount</th>' +
      '</tr></thead><tbody>';

    var expTotal = 0;
    data.expenses.forEach(function(exp) {
      expTotal += Number(exp.amount) || 0;
      html += '<tr>' +
        '<td>' + formatDate(exp.date) + '</td>' +
        '<td>' + escapeHtml(exp.work_code) + '</td>' +
        '<td>' + escapeHtml(exp.description) + '</td>' +
        '<td class="number">' + formatCurrency(exp.amount, currency) + '</td>' +
        '</tr>';
    });
    html += '<tr><td colspan="3"><strong>Expenses Subtotal</strong></td>' +
      '<td class="number"><strong>' + formatCurrency(expTotal, currency) + '</strong></td></tr>';
    html += '</tbody></table>';
  }

  html += '<div class="invoice-totals">' +
    '<table><tr><td class="label">Subtotal</td><td class="number">' + formatCurrency(inv.subtotal, currency) + '</td></tr>';
  if (includeGst) {
    var gstPct = Number(inv.gst_rate) || 0;
    html += '<tr><td class="label">GST (' + (gstPct * 100).toFixed(0) + '%)</td>' +
            '<td class="number">' + formatCurrency(inv.gst_amount, currency) + '</td></tr>';
  }
  html += '<tr class="grand-total"><td class="label">Total</td><td class="number">' + formatCurrency(inv.total, currency) + '</td></tr></table></div>';

  if (my.bank_account || my.payment_terms) {
    html += '<div class="invoice-footer">';
    if (my.payment_terms) html += '<div><span class="label">Payment Terms:</span> ' + escapeHtml(my.payment_terms) + '</div>';
    if (my.bank_account) html += '<div><span class="label">Bank Account:</span> ' + escapeHtml(my.bank_account) + '</div>';
    html += '</div>';
  }

  if (inv.notes) {
    html += '<div class="invoice-notes"><strong>Notes</strong><br>' + escapeHtml(inv.notes).replace(/\n/g, '<br>') + '</div>';
  }

  html += '</article>';

  if (data.allocations && data.allocations.length > 0) {
    html += '<section class="no-print"><h4 class="section-label">Budget Allocations</h4>' +
      '<table class="data-table"><thead><tr>' +
      '<th>Category</th><th class="number">%</th><th class="number">Amount</th><th>Status</th>' +
      '</tr></thead><tbody>';
    data.allocations.forEach(function(a) {
      var status = (a.status === 'transferred' || a.status === 'reconciled') ? 'paid' : (a.status === 'pending' ? 'allocated' : a.status);
      html += '<tr>' +
        '<td>' + escapeHtml(a.category) + '</td>' +
        '<td class="number">' + formatPercent(a.percentage) + '</td>' +
        '<td class="number">' + formatCurrency(a.amount, currency) + '</td>' +
        '<td><span class="badge badge-' + status + '">' + status + '</span></td>' +
        '</tr>';
    });
    html += '</tbody></table></section>';
  }

  content.innerHTML = html;
}

// --- Edit Invoice ---

function editInvoice(invoiceId) {
  var content = document.getElementById('invoice-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getInvoiceDetails', invoiceId).then(function(data) {
    var inv = data.invoice;
    var includeGst = inv.include_gst === true || inv.include_gst === 'true' || inv.include_gst === 'TRUE';
    var gstRate = Number(inv.gst_rate) || 0;

    var html =
      '<div class="invoice-toolbar">' +
        '<button class="btn-subtle" onclick="viewInvoice(\'' + invoiceId + '\')">&larr; Cancel</button>' +
      '</div>' +
      '<article>' +
        '<h3>Edit Invoice ' + escapeHtml(invoiceId) + '</h3>' +
        '<form id="edit-invoice-form" onsubmit="submitInvoiceEdit(event, \'' + invoiceId + '\')">' +
          '<label>Description' +
            '<input type="text" id="edit-inv-desc" value="' + escapeHtml(inv.description || '') + '">' +
          '</label>' +
          '<label>Notes' +
            '<textarea id="edit-inv-notes" rows="3">' + escapeHtml(inv.notes || '') + '</textarea>' +
          '</label>' +
          '<div class="form-row">' +
            '<label><input type="checkbox" id="edit-inv-gst"' + (includeGst ? ' checked' : '') + '> Include GST</label>' +
            '<label>GST Rate (%) <input type="number" id="edit-inv-gst-rate" step="0.01" value="' + (gstRate * 100).toFixed(2) + '" min="0" max="100"></label>' +
          '</div>';

    if (data.codeGroups && data.codeGroups.length > 0) {
      html += '<h4 class="section-label">Line Item Descriptions</h4>' +
        '<p class="muted" style="margin:0 0 0.5rem;font-size:0.82rem;">Override the default work code description for each line on this invoice.</p>';
      data.codeGroups.forEach(function(group) {
        var defaultDesc = '';
        if (AppCache.workCodes) {
          var wc = AppCache.workCodes.find(function(c) { return c.code_id === group.code; });
          if (wc) defaultDesc = wc.description;
        }
        var currentDesc = group.description || '';
        html += '<label>' + escapeHtml(group.code) + ' (' + group.totalHours.toFixed(1) + ' hrs)' +
          '<input type="text" class="edit-line-desc" data-code="' + escapeHtml(group.code) + '" value="' + escapeHtml(currentDesc) + '" placeholder="' + escapeHtml(defaultDesc) + '">' +
        '</label>';
      });
    }

    html += '<div class="form-actions">' +
            '<button type="submit">Save Changes</button>' +
            '<button type="button" class="btn-subtle" onclick="viewInvoice(\'' + invoiceId + '\')">Cancel</button>' +
          '</div>' +
        '</form>' +
      '</article>';

    content.innerHTML = html;
  }).catch(function(err) {
    content.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function submitInvoiceEdit(event, invoiceId) {
  event.preventDefault();
  var lineDescs = {};
  document.querySelectorAll('.edit-line-desc').forEach(function(input) {
    if (input.value.trim()) {
      lineDescs[input.dataset.code] = input.value.trim();
    }
  });

  var data = {
    invoice_id: invoiceId,
    description: document.getElementById('edit-inv-desc').value,
    notes: document.getElementById('edit-inv-notes').value,
    include_gst: document.getElementById('edit-inv-gst').checked,
    gst_rate: Number(document.getElementById('edit-inv-gst-rate').value) / 100,
    line_descriptions: lineDescs
  };

  serverCall('updateInvoice', data).then(function() {
    showToast('Invoice updated');
    // List row shows totals/description that may have changed; bust budget too in case allocations exist.
    App.invalidate(['invoices', 'budget']);
    viewInvoice(invoiceId);
  }).catch(function(err) { showToast(err.message, 'error'); });
}

// --- Create Invoice ---

function renderCreateInvoice() {
  var businesses = AppCache.businesses || [];
  var content = document.getElementById('invoice-tab-content');

  content.innerHTML =
    '<form id="create-invoice-form">' +
      '<div class="form-row">' +
        '<label>Business ' + buildSelect('inv-business', businesses, 'business_id', 'name', { required: true }) + '</label>' +
        '<label>From <input type="date" id="inv-from" required></label>' +
        '<label>To <input type="date" id="inv-to" required value="' + todayStr() + '"></label>' +
      '</div>' +
      '<div class="form-row">' +
        '<label><input type="checkbox" id="inv-gst" checked> Include GST</label>' +
        '<label>GST Rate (%) <input type="number" id="inv-gst-rate" step="0.01" value="15" min="0" max="100"></label>' +
      '</div>' +
      '<div class="form-actions">' +
        '<button type="button" onclick="previewInvoice()">Preview Items</button>' +
      '</div>' +
    '</form>' +
    '<div id="invoice-preview"></div>';
}

function previewInvoice() {
  var bizId = document.getElementById('inv-business').value;
  var from = document.getElementById('inv-from').value;
  var to = document.getElementById('inv-to').value;

  if (!bizId || !from || !to) {
    showToast('Please fill in all fields.', 'error');
    return;
  }

  var preview = document.getElementById('invoice-preview');
  preview.innerHTML = '<div aria-busy="true">Loading uninvoiced items...</div>';

  var includeGst = document.getElementById('inv-gst').checked;
  var gstRate = Number(document.getElementById('inv-gst-rate').value) / 100;
  var currency = getCurrencyForBusiness(bizId);

  serverCall('getUninvoicedItems', { businessId: bizId, dateFrom: from, dateTo: to }).then(function(items) {
    if (items.timeEntries.length === 0 && items.expenses.length === 0) {
      preview.innerHTML = '<p class="muted">No uninvoiced items found for this period.</p>';
      return;
    }

    var html = '<h4 class="section-label">Items to Invoice</h4>';

    if (items.timeEntries.length > 0) {
      var timeTotal = items.timeEntries.reduce(function(s, e) { return s + (Number(e.line_total) || 0); }, 0);
      html += '<p><strong>' + items.timeEntries.length + ' time entries</strong> &mdash; ' + formatCurrency(timeTotal, currency) + '</p>';
      html += '<table class="data-table"><thead><tr><th>Date</th><th>Code</th><th class="number">Hours</th><th>Description</th><th class="number">Amount</th></tr></thead><tbody>';
      items.timeEntries.forEach(function(te) {
        html += '<tr><td>' + formatDate(te.date) + '</td><td>' + escapeHtml(te.work_code) + '</td>' +
          '<td class="number">' + (Number(te.hours) || 0).toFixed(2) + '</td>' +
          '<td>' + escapeHtml(te.description) + '</td>' +
          '<td class="number">' + formatCurrency(te.line_total, currency) + '</td></tr>';
      });
      html += '</tbody></table>';
    }

    if (items.expenses.length > 0) {
      var expTotal = items.expenses.reduce(function(s, e) { return s + (Number(e.amount) || 0); }, 0);
      html += '<p><strong>' + items.expenses.length + ' expenses</strong> &mdash; ' + formatCurrency(expTotal, currency) + '</p>';
      html += '<table class="data-table"><thead><tr><th>Date</th><th>Code</th><th>Description</th><th class="number">Amount</th></tr></thead><tbody>';
      items.expenses.forEach(function(exp) {
        html += '<tr><td>' + formatDate(exp.date) + '</td><td>' + escapeHtml(exp.work_code) + '</td>' +
          '<td>' + escapeHtml(exp.description) + '</td>' +
          '<td class="number">' + formatCurrency(exp.amount, currency) + '</td></tr>';
      });
      html += '</tbody></table>';
    }

    var subtotal = items.timeEntries.reduce(function(s, e) { return s + (Number(e.line_total) || 0); }, 0) +
                   items.expenses.reduce(function(s, e) { return s + (Number(e.amount) || 0); }, 0);
    var gst = includeGst ? Math.round(subtotal * gstRate * 100) / 100 : 0;

    html += '<div class="preview-totals">' +
      '<strong>Subtotal:</strong> ' + formatCurrency(subtotal, currency);
    if (includeGst) {
      html += ' &nbsp; <strong>GST (' + (gstRate * 100).toFixed(0) + '%):</strong> ' + formatCurrency(gst, currency);
    }
    html += ' &nbsp; <strong>Total:</strong> ' + formatCurrency(subtotal + gst, currency) + '</div>';

    // Collect unique work codes for line description overrides
    var codeSet = {};
    items.timeEntries.forEach(function(te) {
      if (!codeSet[te.work_code]) {
        var desc = te.work_code;
        if (AppCache.workCodes) {
          var wc = AppCache.workCodes.find(function(c) { return c.code_id === te.work_code; });
          if (wc) desc = wc.description;
        }
        codeSet[te.work_code] = desc;
      }
    });

    html += '<div class="form-stack">' +
      '<label>Invoice Description <input type="text" id="inv-desc" placeholder="Optional description"></label>';

    var codes = Object.keys(codeSet);
    if (codes.length > 0) {
      html += '<h4 class="section-label">Line Item Descriptions</h4>' +
        '<p class="muted" style="margin:0 0 0.5rem;font-size:0.82rem;">Optionally override the description shown on the invoice for each work code.</p>';
      codes.forEach(function(code) {
        html += '<label>' + escapeHtml(code) +
          ' <input type="text" class="create-line-desc" data-code="' + escapeHtml(code) + '" placeholder="' + escapeHtml(codeSet[code]) + '">' +
        '</label>';
      });
    }

    html += '<label>Notes <textarea id="inv-notes" rows="2" placeholder="Additional notes"></textarea></label>' +
      '<div class="form-actions">' +
        '<button onclick="confirmCreateInvoice()">Create Invoice</button>' +
        '<button class="btn-subtle" onclick="renderCreateInvoice()">Cancel</button>' +
      '</div></div>';

    preview.innerHTML = html;
  }).catch(function(err) {
    preview.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function confirmCreateInvoice() {
  var lineDescs = {};
  document.querySelectorAll('.create-line-desc').forEach(function(input) {
    if (input.value.trim()) {
      lineDescs[input.dataset.code] = input.value.trim();
    }
  });

  var params = {
    businessId: document.getElementById('inv-business').value,
    dateFrom: document.getElementById('inv-from').value,
    dateTo: document.getElementById('inv-to').value,
    includeGst: document.getElementById('inv-gst').checked,
    gstRate: Number(document.getElementById('inv-gst-rate').value) / 100,
    description: document.getElementById('inv-desc').value,
    notes: document.getElementById('inv-notes').value,
    lineDescriptions: Object.keys(lineDescs).length > 0 ? lineDescs : undefined
  };

  if (!confirm('Create this invoice? Time entries and expenses will be marked as invoiced.')) return;

  serverCall('generateInvoice', params).then(function(invoice) {
    showToast('Invoice ' + invoice.invoice_id + ' created');
    App.invalidate(['hours', 'budget']);
    showInvoiceTab('list');
  }).catch(function(err) { showToast(err.message, 'error'); });
}
</script>
