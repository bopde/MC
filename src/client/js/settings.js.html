<script>
/**
 * Settings module.
 * Manage reference data: My Details, Businesses, Work Codes, Accounts, Budget Rules.
 */

function renderSettingsPage(container) {
  container.innerHTML =
    '<div class="tab-bar" id="settings-tabs">' +
      '<button type="button" class="active" onclick="showSettingsTab(\'mydetails\')">My Details</button>' +
      '<button type="button" onclick="showSettingsTab(\'businesses\')">Businesses</button>' +
      '<button type="button" onclick="showSettingsTab(\'contracts\')">Contracts</button>' +
      '<button type="button" onclick="showSettingsTab(\'codes\')">Work Codes</button>' +
      '<button type="button" onclick="showSettingsTab(\'accounts\')">Accounts</button>' +
      '<button type="button" onclick="showSettingsTab(\'rules\')">Budget Rules</button>' +
    '</div>' +
    '<div id="settings-tab-content"></div>';

  showSettingsTab('mydetails');
}

function showSettingsTab(tab) {
  var btns = document.querySelectorAll('#settings-tabs button');
  btns.forEach(function(btn) { btn.classList.remove('active'); });
  var labels = { mydetails: 0, businesses: 1, contracts: 2, codes: 3, accounts: 4, rules: 5 };
  btns[labels[tab]].classList.add('active');

  var renderers = {
    mydetails: renderMyDetailsSettings,
    businesses: renderBusinessSettings,
    contracts: renderContractSettings,
    codes: renderCodeSettings,
    accounts: renderAccountSettings,
    rules: renderRuleSettings
  };
  renderers[tab]();
}

// --- My Details (Invoice From) ---

function renderMyDetailsSettings() {
  var content = document.getElementById('settings-tab-content');
  var my = AppCache.myDetails || {};

  content.innerHTML =
    '<p>These details appear on your invoices as the "From" section.</p>' +
    '<form id="my-details-form" onsubmit="saveMyDetailsForm(event)">' +
      '<div class="form-row">' +
        '<label>Business / Your Name <input type="text" id="md-biz-name" value="' + escapeHtml(my.business_name || '') + '"></label>' +
        '<label>Contact Name <input type="text" id="md-contact" value="' + escapeHtml(my.contact_name || '') + '"></label>' +
      '</div>' +
      '<div class="form-row">' +
        '<label>Email <input type="email" id="md-email" value="' + escapeHtml(my.email || '') + '"></label>' +
        '<label>Phone <input type="text" id="md-phone" value="' + escapeHtml(my.phone || '') + '"></label>' +
      '</div>' +
      '<label>Address <textarea id="md-address" rows="2">' + escapeHtml(my.address || '') + '</textarea></label>' +
      '<div class="form-row">' +
        '<label>Tax Number (IRD / EIN) <input type="text" id="md-tax" value="' + escapeHtml(my.tax_number || '') + '"></label>' +
        '<label>GST Number <input type="text" id="md-gst" value="' + escapeHtml(my.gst_number || '') + '"></label>' +
      '</div>' +
      '<div class="form-row">' +
        '<label>Bank Account (for payment) <input type="text" id="md-bank" value="' + escapeHtml(my.bank_account || '') + '"></label>' +
        '<label>Payment Terms <input type="text" id="md-terms" value="' + escapeHtml(my.payment_terms || '') + '" placeholder="e.g. Due within 14 days"></label>' +
      '</div>' +
      '<div class="form-actions"><button type="submit">Save Details</button></div>' +
    '</form>';
}

function saveMyDetailsForm(event) {
  event.preventDefault();
  var data = {
    business_name: document.getElementById('md-biz-name').value,
    contact_name: document.getElementById('md-contact').value,
    email: document.getElementById('md-email').value,
    phone: document.getElementById('md-phone').value,
    address: document.getElementById('md-address').value,
    tax_number: document.getElementById('md-tax').value,
    gst_number: document.getElementById('md-gst').value,
    bank_account: document.getElementById('md-bank').value,
    payment_terms: document.getElementById('md-terms').value
  };

  serverCall('saveMyDetails', data).then(function(details) {
    AppCache.myDetails = details;
    showToast('Details saved!');
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

// --- Businesses ---

function renderBusinessSettings() {
  var content = document.getElementById('settings-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getAllBusinesses').then(function(businesses) {
    var currencyOptions = '<option value="NZD">NZD</option><option value="USD">USD</option>' +
      '<option value="AUD">AUD</option><option value="GBP">GBP</option><option value="EUR">EUR</option>';

    var html =
      '<details class="add-form-panel"><summary>+ Add New Business</summary><div>' +
      '<form id="add-biz-form" onsubmit="submitBusiness(event)">' +
        '<div class="form-row">' +
          '<label>Name <input type="text" id="biz-name" required></label>' +
          '<label>Contact Name <input type="text" id="biz-contact"></label>' +
        '</div>' +
        '<div class="form-row">' +
          '<label>Email <input type="email" id="biz-email"></label>' +
          '<label>Default Rate (per hr) <input type="number" id="biz-rate" step="0.01"></label>' +
          '<label>Currency <select id="biz-currency">' + currencyOptions + '</select></label>' +
        '</div>' +
        '<label>Address <textarea id="biz-address" rows="2"></textarea></label>' +
        '<div class="form-actions"><button type="submit">Add Business</button></div>' +
      '</form></div></details>' +
      '<div id="biz-edit-area"></div>';

    if (businesses.length > 0) {
      html += '<table><thead><tr>' +
        '<th>Name</th><th>Contact</th><th>Email</th>' +
        '<th class="number">Rate</th><th>Currency</th><th></th>' +
        '</tr></thead><tbody>';

      businesses.forEach(function(b) {
        var isActive = b.active === true || b.active === 'TRUE' || b.active === 'true';
        var cur = b.currency || 'NZD';
        html += '<tr style="' + (isActive ? '' : 'opacity:0.5;') + '">' +
          '<td><strong>' + escapeHtml(b.name) + '</strong></td>' +
          '<td>' + escapeHtml(b.contact_name) + '</td>' +
          '<td>' + escapeHtml(b.email) + '</td>' +
          '<td class="number">' + formatCurrency(b.default_rate, cur) + '</td>' +
          '<td>' + escapeHtml(cur) + '</td>' +
          '<td class="actions">' +
            '<button type="button" class="btn-small btn-subtle" onclick="editBusiness(\'' + escapeHtml(b.business_id) + '\')">Edit</button> ' +
            (isActive
              ? '<button type="button" class="btn-small btn-subtle" onclick="toggleBusiness(' + b._rowIndex + ', false)">Deactivate</button>'
              : '<button type="button" class="btn-small" onclick="toggleBusiness(' + b._rowIndex + ', true)">Activate</button>') +
          '</td>' +
          '</tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p>No businesses configured. Add one above.</p>';
    }

    content.innerHTML = html;
  }).catch(function(err) {
    content.innerHTML = '<p>Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function editBusiness(bizId) {
  var businesses = AppCache.businesses || [];
  var all = null;
  serverCall('getAllBusinesses').then(function(bs) {
    all = bs;
    var b = bs.find(function(x) { return idsMatch(x.business_id, bizId); });
    if (!b) { showToast('Business not found', 'error'); return; }

    var cur = b.currency || 'NZD';
    var currencies = ['NZD','USD','AUD','GBP','EUR'];
    var curOpts = currencies.map(function(c) {
      return '<option value="' + c + '"' + (c === cur ? ' selected' : '') + '>' + c + '</option>';
    }).join('');

    var area = document.getElementById('biz-edit-area');
    area.innerHTML =
      '<article style="margin:1rem 0;">' +
        '<header><h4>Edit: ' + escapeHtml(b.name) + '</h4></header>' +
        '<form onsubmit="saveBusiness(event, \'' + escapeHtml(b.business_id) + '\')">' +
          '<div class="form-row">' +
            '<label>Name <input type="text" id="ebiz-name" required value="' + escapeHtml(b.name) + '"></label>' +
            '<label>Contact Name <input type="text" id="ebiz-contact" value="' + escapeHtml(b.contact_name || '') + '"></label>' +
          '</div>' +
          '<div class="form-row">' +
            '<label>Email <input type="email" id="ebiz-email" value="' + escapeHtml(b.email || '') + '"></label>' +
            '<label>Default Rate <input type="number" id="ebiz-rate" step="0.01" value="' + (b.default_rate || '') + '"></label>' +
            '<label>Currency <select id="ebiz-currency">' + curOpts + '</select></label>' +
          '</div>' +
          '<label>Address <textarea id="ebiz-address" rows="2">' + escapeHtml(b.address || '') + '</textarea></label>' +
          '<div class="form-actions">' +
            '<button type="submit">Save</button>' +
            '<button type="button" class="btn-subtle" onclick="document.getElementById(\'biz-edit-area\').innerHTML=\'\'">Cancel</button>' +
          '</div>' +
        '</form>' +
      '</article>';
    area.scrollIntoView({ behavior: 'smooth' });
  });
}

function saveBusiness(event, bizId) {
  event.preventDefault();
  var data = {
    business_id: bizId,
    name: document.getElementById('ebiz-name').value,
    contact_name: document.getElementById('ebiz-contact').value,
    email: document.getElementById('ebiz-email').value,
    default_rate: Number(document.getElementById('ebiz-rate').value) || 0,
    currency: document.getElementById('ebiz-currency').value || 'NZD',
    address: document.getElementById('ebiz-address').value
  };

  serverCall('updateBusiness', data).then(function() {
    showToast('Business updated!');
    document.getElementById('biz-edit-area').innerHTML = '';
    refreshReferenceData();
    renderBusinessSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

function submitBusiness(event) {
  event.preventDefault();
  var data = {
    name: document.getElementById('biz-name').value,
    contact_name: document.getElementById('biz-contact').value,
    email: document.getElementById('biz-email').value,
    default_rate: Number(document.getElementById('biz-rate').value) || 0,
    currency: document.getElementById('biz-currency').value || 'NZD',
    address: document.getElementById('biz-address').value
  };

  serverCall('addBusiness', data).then(function() {
    showToast('Business added!');
    loadReferenceData();
    renderBusinessSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

function toggleBusiness(rowIndex, active) {
  serverCall('toggleEntityFromClient', 'Businesses|' + rowIndex + '|' + active).then(function() {
    showToast(active ? 'Business activated!' : 'Business deactivated!');
    loadReferenceData();
    renderBusinessSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

// --- Work Codes ---

function renderCodeSettings() {
  var content = document.getElementById('settings-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  Promise.all([
    serverCall('getAllClient', 'WorkCodes'),
    serverCall('getAllClient', 'Contracts')
  ]).then(function(results) {
    var codes = results[0] || [];
    var contracts = results[1] || [];

    var contractOpts = contracts.map(function(c) {
      return { id: c.contract_id, label: c.name };
    });

    var html =
      '<details class="add-form-panel"><summary>+ Add New Work Code</summary><div>' +
      '<form id="add-code-form" onsubmit="submitWorkCode(event)">' +
        '<div class="form-row">' +
          '<label>Code ID <input type="text" id="wc-id" required placeholder="e.g. Dev, Design, PM"></label>' +
          '<label>Description <input type="text" id="wc-desc" required placeholder="e.g. Software Development"></label>' +
        '</div>' +
        '<div class="form-row">' +
          '<label>Category <select id="wc-cat"><option value="billable">Billable</option><option value="non-billable">Non-billable</option></select></label>' +
          '<label>Contract ' + buildSelect('wc-contract', contractOpts, 'id', 'label', { placeholder: 'None' }) + '</label>' +
        '</div>' +
        '<div class="form-actions"><button type="submit">Add Code</button></div>' +
      '</form></div></details>' +
      '<div id="code-edit-area"></div>';

    if (codes.length > 0) {
      var conMap = {};
      contracts.forEach(function(c) { conMap[normalizeId(c.contract_id)] = c.name; });

      html += '<table><thead><tr><th>Code ID</th><th>Description</th><th>Category</th><th>Contract</th><th></th></tr></thead><tbody>';
      codes.forEach(function(c) {
        var isActive = c.active === true || c.active === 'TRUE' || c.active === 'true';
        var conName = c.contract_id ? (conMap[normalizeId(c.contract_id)] || '') : '';
        html += '<tr style="' + (isActive ? '' : 'opacity:0.5;') + '">' +
          '<td><strong>' + escapeHtml(c.code_id) + '</strong></td>' +
          '<td>' + escapeHtml(c.description) + '</td>' +
          '<td>' + escapeHtml(c.category) + '</td>' +
          '<td>' + (conName ? escapeHtml(conName) : '<span class="muted">—</span>') + '</td>' +
          '<td class="actions">' +
            '<button type="button" class="btn-small btn-subtle" onclick="editWorkCode(\'' + escapeHtml(c.code_id) + '\')">Edit</button> ' +
            (isActive
              ? '<button type="button" class="btn-small btn-subtle" onclick="toggleCode(' + c._rowIndex + ', false)">Deactivate</button>'
              : '<button type="button" class="btn-small" onclick="toggleCode(' + c._rowIndex + ', true)">Activate</button>') +
          '</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p>No work codes configured.</p>';
    }

    content.innerHTML = html;
  }).catch(function(err) {
    content.innerHTML = '<p>Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function editWorkCode(codeId) {
  Promise.all([
    serverCall('getAllClient', 'WorkCodes'),
    serverCall('getAllClient', 'Contracts')
  ]).then(function(results) {
    var codes = results[0] || [];
    var contracts = results[1] || [];
    var c = codes.find(function(x) { return x.code_id === codeId; });
    if (!c) { showToast('Code not found', 'error'); return; }

    var catOpts = ['billable', 'non-billable'].map(function(v) {
      return '<option value="' + v + '"' + (v === c.category ? ' selected' : '') + '>' + v + '</option>';
    }).join('');

    var conOpts = '<option value="">None</option>' + contracts.map(function(con) {
      var sel = idsMatch(con.contract_id, c.contract_id || '') ? ' selected' : '';
      return '<option value="' + escapeHtml(con.contract_id) + '"' + sel + '>' + escapeHtml(con.name) + '</option>';
    }).join('');

    var area = document.getElementById('code-edit-area');
    area.innerHTML =
      '<article style="margin:1rem 0;">' +
        '<header><h4>Edit: ' + escapeHtml(c.code_id) + '</h4></header>' +
        '<form onsubmit="saveWorkCode(event, \'' + escapeHtml(c.code_id) + '\')">' +
          '<div class="form-row">' +
            '<label>Description <input type="text" id="ewc-desc" required value="' + escapeHtml(c.description) + '"></label>' +
            '<label>Category <select id="ewc-cat">' + catOpts + '</select></label>' +
            '<label>Contract <select id="ewc-contract">' + conOpts + '</select></label>' +
          '</div>' +
          '<div class="form-actions">' +
            '<button type="submit">Save</button>' +
            '<button type="button" class="btn-subtle" onclick="document.getElementById(\'code-edit-area\').innerHTML=\'\'">Cancel</button>' +
          '</div>' +
        '</form>' +
      '</article>';
    area.scrollIntoView({ behavior: 'smooth' });
  });
}

function saveWorkCode(event, codeId) {
  event.preventDefault();
  var data = {
    code_id: codeId,
    description: document.getElementById('ewc-desc').value,
    category: document.getElementById('ewc-cat').value,
    contract_id: document.getElementById('ewc-contract').value
  };

  serverCall('updateWorkCode', data).then(function() {
    showToast('Work code updated!');
    document.getElementById('code-edit-area').innerHTML = '';
    refreshReferenceData();
    renderCodeSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

function submitWorkCode(event) {
  event.preventDefault();
  var data = {
    code_id: document.getElementById('wc-id').value.trim(),
    description: document.getElementById('wc-desc').value,
    category: document.getElementById('wc-cat').value,
    contract_id: document.getElementById('wc-contract').value
  };

  serverCall('addWorkCode', data).then(function() {
    showToast('Work code added!');
    loadReferenceData();
    renderCodeSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

function toggleCode(rowIndex, active) {
  serverCall('toggleEntityFromClient', 'WorkCodes|' + rowIndex + '|' + active).then(function() {
    showToast(active ? 'Code activated!' : 'Code deactivated!');
    loadReferenceData();
    renderCodeSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

// --- Accounts ---

// --- Budget Rules ---

var _rulePctFields = [
  { id: 'br-tax-withheld', label: 'Tax Withheld %', field: 'tax_withheld_pct', tier: 'withheld', default: '0' },
  { id: 'br-acc-withheld', label: 'ACC Withheld %', field: 'acc_withheld_pct', tier: 'withheld', default: '0' },
  { id: 'br-tax-to-pay', label: 'Tax To Pay %', field: 'tax_to_pay_pct', tier: 'obligation', default: '0.28' },
  { id: 'br-acc-to-pay', label: 'ACC To Pay %', field: 'acc_to_pay_pct', tier: 'obligation', default: '0.02' },
  { id: 'br-donate', label: 'Donate %', field: 'donate_pct', tier: 'distribution', default: '0.05' },
  { id: 'br-save', label: 'Save %', field: 'save_pct', tier: 'distribution', default: '0.10' },
  { id: 'br-invest', label: 'Invest %', field: 'invest_pct', tier: 'distribution', default: '0.15' },
  { id: 'br-spend', label: 'Spend %', field: 'spend_pct', tier: 'distribution', default: '0.70' }
];

var _editingRuleId = null;

function buildRuleFormFields(prefix, values) {
  var html = '<div class="form-row">' +
    '<label>Rule Name <input type="text" id="' + prefix + '-name" required placeholder="e.g. Default Split" value="' + escapeHtml(values.name || '') + '"></label>' +
  '</div>' +
  '<p class="muted" style="margin:0.5rem 0;font-size:0.82rem;">' +
    '<strong>Tier 1 — Withheld:</strong> deducted from gross → gives adjusted. ' +
    '<strong>Tier 2 — Obligations:</strong> deducted from adjusted → gives net. ' +
    '<strong>Tier 3 — Distribution:</strong> split of net, must sum to 100%. ' +
    'Enter as decimals (e.g. 0.28 = 28%).' +
  '</p>' +
  '<p class="muted" style="margin:0 0 0.5rem;font-size:0.78rem;"><em>Tier 1 — Withheld (from gross)</em></p>' +
  '<div class="form-row">';

  _rulePctFields.forEach(function(f, i) {
    var val = values[f.field] !== undefined ? values[f.field] : f.default;
    html += '<label>' + f.label + ' <input type="number" id="' + prefix + '-' + f.field + '" step="0.01" value="' + val + '" required></label>';
    if (i === 1) html += '</div><p class="muted" style="margin:0 0 0.5rem;font-size:0.78rem;"><em>Tier 2 — Obligations (from adjusted)</em></p><div class="form-row">';
    if (i === 3) html += '</div><p class="muted" style="margin:0 0 0.5rem;font-size:0.78rem;"><em>Tier 3 — Distribution (from net, must = 100%)</em></p><div class="form-row">';
  });

  html += '</div>' +
    '<div class="form-row">' +
      '<label><input type="checkbox" id="' + prefix + '-default"' + (values.is_default ? ' checked' : '') + '> Set as default rule</label>' +
      '<label>Notes <input type="text" id="' + prefix + '-notes" value="' + escapeHtml(values.notes || '') + '"></label>' +
    '</div>' +
    '<p id="' + prefix + '-sum-display" style="font-weight:600;"></p>';
  return html;
}

function attachRuleSumListeners(prefix) {
  _rulePctFields.forEach(function(f) {
    var el = document.getElementById(prefix + '-' + f.field);
    if (el) el.addEventListener('input', function() { updateRuleSum(prefix); });
  });
  updateRuleSum(prefix);
}

function readRuleFormData(prefix) {
  var data = { name: document.getElementById(prefix + '-name').value };
  _rulePctFields.forEach(function(f) {
    data[f.field] = Number(document.getElementById(prefix + '-' + f.field).value);
  });
  data.is_default = document.getElementById(prefix + '-default').checked;
  data.notes = document.getElementById(prefix + '-notes').value;
  return data;
}

function renderRuleSettings() {
  var content = document.getElementById('settings-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getBudgetRules').then(function(rules) {
    var html =
      '<details class="add-form-panel"><summary>+ Add New Budget Rule</summary><div>' +
      '<form id="add-rule-form" onsubmit="submitBudgetRule(event)">' +
        buildRuleFormFields('br', {}) +
        '<div class="form-actions"><button type="submit">Add Rule</button></div>' +
      '</form></div></details>';

    html += '<div id="rule-edit-area"></div>';

    if (rules.length > 0) {
      html += '<div class="scroll-x"><table class="data-table"><thead><tr>' +
        '<th>Name</th>' +
        '<th class="number">Tax Wtd</th><th class="number">ACC Wtd</th>' +
        '<th class="number">Tax Pay</th><th class="number">ACC Pay</th>' +
        '<th class="number">Donate</th><th class="number">Save</th>' +
        '<th class="number">Invest</th><th class="number">Spend</th>' +
        '<th>Default</th><th>Active</th><th></th></tr></thead><tbody>';

      rules.forEach(function(r) {
        var isDef = r.is_default === true || r.is_default === 'TRUE' || r.is_default === 'true';
        var isActive = r.active === true || r.active === 'TRUE' || r.active === 'true' || r.active === '' || r.active === undefined;
        html += '<tr id="rule-row-' + escapeHtml(r.rule_id) + '" style="' + (isActive ? '' : 'opacity:0.5;') + '"><td><strong>' + escapeHtml(r.name) + '</strong></td>';
        _rulePctFields.forEach(function(f) {
          html += '<td class="number">' + formatPercent(r[f.field]) + '</td>';
        });
        html += '<td>' + (isDef ? 'Yes' : '') + '</td>' +
          '<td>' +
            (isActive
              ? '<button type="button" class="btn-small btn-subtle" onclick="toggleBudgetRule(' + r._rowIndex + ', false)">Deactivate</button>'
              : '<button type="button" class="btn-small" onclick="toggleBudgetRule(' + r._rowIndex + ', true)">Activate</button>') +
          '</td>' +
          '<td class="actions"><button type="button" class="btn-small btn-subtle" onclick="editBudgetRule(\'' + escapeHtml(r.rule_id) + '\')">Edit</button></td></tr>';
      });
      html += '</tbody></table></div>';
    } else {
      html += '<p>No budget rules configured. Add one to start allocating invoice payments.</p>';
    }

    content.innerHTML = html;
    attachRuleSumListeners('br');
  }).catch(function(err) {
    content.innerHTML = '<p>Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function editBudgetRule(ruleId) {
  var rule = (AppCache.budgetRules || []).find(function(r) { return r.rule_id === ruleId; });
  if (!rule) { showToast('Rule not found in cache', 'error'); return; }

  _editingRuleId = ruleId;
  var area = document.getElementById('rule-edit-area');

  var isDef = rule.is_default === true || rule.is_default === 'TRUE' || rule.is_default === 'true';
  var values = { name: rule.name, notes: rule.notes, is_default: isDef };
  _rulePctFields.forEach(function(f) { values[f.field] = rule[f.field]; });

  area.innerHTML =
    '<article style="margin:1rem 0;">' +
      '<header><h4>Edit Rule: ' + escapeHtml(rule.name) + '</h4></header>' +
      '<form id="edit-rule-form" onsubmit="submitBudgetRuleEdit(event)">' +
        buildRuleFormFields('bre', values) +
        '<div class="form-actions">' +
          '<button type="submit">Save Changes</button>' +
          '<button type="button" class="btn-subtle" onclick="cancelRuleEdit()">Cancel</button>' +
        '</div>' +
      '</form>' +
    '</article>';

  attachRuleSumListeners('bre');
  area.scrollIntoView({ behavior: 'smooth' });
}

function cancelRuleEdit() {
  _editingRuleId = null;
  var area = document.getElementById('rule-edit-area');
  if (area) area.innerHTML = '';
}

function updateRuleSum(prefix) {
  var withheldSum = 0, obligationSum = 0, distSum = 0;
  _rulePctFields.forEach(function(f) {
    var val = Number(document.getElementById(prefix + '-' + f.field).value) || 0;
    if (f.tier === 'withheld') withheldSum += val;
    else if (f.tier === 'obligation') obligationSum += val;
    else distSum += val;
  });

  var display = document.getElementById(prefix + '-sum-display');
  if (display) {
    var distOk = Math.abs(distSum - 1.0) < 0.001;
    display.innerHTML =
      'Withheld (from gross): ' + (withheldSum * 100).toFixed(1) + '% &nbsp; ' +
      'Obligations (from adjusted): ' + (obligationSum * 100).toFixed(1) + '% &nbsp; ' +
      'Distribution (from net): <strong style="color:' + (distOk ? 'var(--sage)' : 'var(--danger)') + '">' +
      (distSum * 100).toFixed(1) + '%</strong>' +
      (distOk ? '' : ' <span style="color:var(--danger)">&mdash; must equal 100%</span>');
  }
}

function submitBudgetRule(event) {
  event.preventDefault();
  var data = readRuleFormData('br');

  serverCall('addBudgetRule', data).then(function() {
    showToast('Budget rule added!');
    refreshReferenceData();
    renderRuleSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

function submitBudgetRuleEdit(event) {
  event.preventDefault();
  var data = readRuleFormData('bre');
  data.rule_id = _editingRuleId;

  serverCall('updateBudgetRule', data).then(function() {
    showToast('Budget rule updated!');
    _editingRuleId = null;
    refreshReferenceData();
    renderRuleSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

function toggleBudgetRule(rowIndex, active) {
  serverCall('toggleEntityFromClient', 'BudgetRules|' + rowIndex + '|' + active).then(function() {
    showToast(active ? 'Budget rule activated!' : 'Budget rule deactivated!');
    refreshReferenceData();
    renderRuleSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

// --- Contracts ---

function renderContractSettings() {
  var content = document.getElementById('settings-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  var businesses = AppCache.businesses || [];
  var currencyOptions = '<option value="NZD">NZD</option><option value="USD">USD</option>' +
    '<option value="AUD">AUD</option><option value="GBP">GBP</option><option value="EUR">EUR</option>';

  serverCall('getAllClient', 'Contracts').then(function(contracts) {
    var html =
      '<details class="add-form-panel"><summary>+ Add New Contract</summary><div>' +
      '<form id="add-contract-form" onsubmit="submitContract(event)">' +
        '<div class="form-row">' +
          '<label>Business ' + buildSelect('con-business', businesses, 'business_id', 'name', { required: true }) + '</label>' +
          '<label>Contract Name <input type="text" id="con-name" required placeholder="e.g. Phase 2 - Platform Build"></label>' +
        '</div>' +
        '<div class="form-row">' +
          '<label>PO Number <input type="text" id="con-po" placeholder="e.g. PO-12345"></label>' +
          '<label>Value <input type="number" id="con-value" step="0.01" required placeholder="Total contract value"></label>' +
          '<label>Currency <select id="con-currency">' + currencyOptions + '</select></label>' +
        '</div>' +
        '<div class="form-row">' +
          '<label>Start Date <input type="date" id="con-from" required></label>' +
          '<label>End Date <input type="date" id="con-to" required></label>' +
        '</div>' +
        '<label>Notes <textarea id="con-notes" rows="2"></textarea></label>' +
        '<p class="muted small">Assign work codes to this contract under the Work Codes tab.</p>' +
        '<div class="form-actions"><button type="submit">Add Contract</button></div>' +
      '</form></div></details>' +
      '<div id="con-edit-area"></div>';

    if (contracts.length > 0) {
      html += '<div class="scroll-x"><table class="data-table"><thead><tr>' +
        '<th>Business</th><th>Name</th><th>PO #</th><th>Period</th>' +
        '<th class="number">Value</th><th>Status</th><th></th>' +
        '</tr></thead><tbody>';

      var bizMap = {};
      businesses.forEach(function(b) { bizMap[normalizeId(b.business_id)] = b.name; });

      contracts.forEach(function(c) {
        var isActive = c.status === 'active';
        html += '<tr style="' + (isActive ? '' : 'opacity:0.5;') + '">' +
          '<td>' + escapeHtml(bizMap[normalizeId(c.business_id)] || c.business_id) + '</td>' +
          '<td><strong>' + escapeHtml(c.name) + '</strong></td>' +
          '<td>' + escapeHtml(c.po_number) + '</td>' +
          '<td>' + formatDate(c.date_from) + ' &rarr; ' + formatDate(c.date_to) + '</td>' +
          '<td class="number">' + formatCurrency(c.value, c.currency || 'NZD') + '</td>' +
          '<td><span class="badge badge-' + (isActive ? 'paid' : 'void') + '">' + escapeHtml(c.status) + '</span></td>' +
          '<td class="actions">' +
            '<button type="button" class="btn-small btn-subtle" onclick="editContract(\'' + escapeHtml(c.contract_id) + '\')">Edit</button> ' +
            (isActive
              ? '<button type="button" class="btn-small btn-subtle" onclick="completeContract(\'' + c.contract_id + '\')">Complete</button>'
              : '') +
          '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else {
      html += '<p class="muted">No contracts yet. Add one above to track budget vs spend.</p>';
    }

    content.innerHTML = html;
  }).catch(function(err) {
    content.innerHTML = '<p class="error">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function editContract(contractId) {
  var businesses = AppCache.businesses || [];
  serverCall('getAllClient', 'Contracts').then(function(contracts) {
    var c = contracts.find(function(x) { return idsMatch(x.contract_id, contractId); });
    if (!c) { showToast('Contract not found', 'error'); return; }

    var bizOpts = businesses.map(function(b) {
      return '<option value="' + escapeHtml(b.business_id) + '"' +
        (idsMatch(b.business_id, c.business_id) ? ' selected' : '') + '>' + escapeHtml(b.name) + '</option>';
    }).join('');

    var currencies = ['NZD','USD','AUD','GBP','EUR'];
    var cur = c.currency || 'NZD';
    var curOpts = currencies.map(function(v) {
      return '<option value="' + v + '"' + (v === cur ? ' selected' : '') + '>' + v + '</option>';
    }).join('');

    var area = document.getElementById('con-edit-area');
    area.innerHTML =
      '<article style="margin:1rem 0;">' +
        '<header><h4>Edit: ' + escapeHtml(c.name) + '</h4></header>' +
        '<form onsubmit="saveContract(event, \'' + escapeHtml(c.contract_id) + '\')">' +
          '<div class="form-row">' +
            '<label>Business <select id="econ-biz">' + bizOpts + '</select></label>' +
            '<label>Name <input type="text" id="econ-name" required value="' + escapeHtml(c.name) + '"></label>' +
          '</div>' +
          '<div class="form-row">' +
            '<label>PO Number <input type="text" id="econ-po" value="' + escapeHtml(c.po_number || '') + '"></label>' +
            '<label>Value <input type="number" id="econ-value" step="0.01" required value="' + (c.value || '') + '"></label>' +
            '<label>Currency <select id="econ-currency">' + curOpts + '</select></label>' +
          '</div>' +
          '<div class="form-row">' +
            '<label>Start Date <input type="date" id="econ-from" required value="' + (c.date_from ? String(c.date_from).slice(0, 10) : '') + '"></label>' +
            '<label>End Date <input type="date" id="econ-to" required value="' + (c.date_to ? String(c.date_to).slice(0, 10) : '') + '"></label>' +
          '</div>' +
          '<label>Notes <textarea id="econ-notes" rows="2">' + escapeHtml(c.notes || '') + '</textarea></label>' +
          '<div class="form-actions">' +
            '<button type="submit">Save</button>' +
            '<button type="button" class="btn-subtle" onclick="document.getElementById(\'con-edit-area\').innerHTML=\'\'">Cancel</button>' +
          '</div>' +
        '</form>' +
      '</article>';
    area.scrollIntoView({ behavior: 'smooth' });
  });
}

function saveContract(event, contractId) {
  event.preventDefault();
  var data = {
    contract_id: contractId,
    business_id: document.getElementById('econ-biz').value,
    name: document.getElementById('econ-name').value,
    po_number: document.getElementById('econ-po').value,
    value: document.getElementById('econ-value').value,
    currency: document.getElementById('econ-currency').value,
    date_from: document.getElementById('econ-from').value,
    date_to: document.getElementById('econ-to').value,
    notes: document.getElementById('econ-notes').value
  };

  serverCall('updateContract', data).then(function() {
    showToast('Contract updated!');
    document.getElementById('con-edit-area').innerHTML = '';
    refreshReferenceData();
    renderContractSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

function submitContract(event) {
  event.preventDefault();
  var data = {
    business_id: document.getElementById('con-business').value,
    name: document.getElementById('con-name').value,
    po_number: document.getElementById('con-po').value,
    value: document.getElementById('con-value').value,
    currency: document.getElementById('con-currency').value,
    date_from: document.getElementById('con-from').value,
    date_to: document.getElementById('con-to').value,
    notes: document.getElementById('con-notes').value
  };

  serverCall('addContract', data).then(function() {
    showToast('Contract added!');
    refreshReferenceData();
    renderContractSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

function completeContract(contractId) {
  if (!confirm('Mark this contract as complete?')) return;
  serverCall('updateContract', { contract_id: contractId, status: 'complete' }).then(function() {
    showToast('Contract completed');
    refreshReferenceData();
    renderContractSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}
</script>
