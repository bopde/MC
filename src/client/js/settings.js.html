<script>
/**
 * Settings module.
 * Manage reference data: My Details, Businesses, Work Codes, Accounts, Budget Rules.
 */

function renderSettingsPage(container) {
  container.innerHTML =
    '<div class="tab-bar" id="settings-tabs">' +
      '<button class="active" onclick="showSettingsTab(\'mydetails\')">My Details</button>' +
      '<button onclick="showSettingsTab(\'businesses\')">Businesses</button>' +
      '<button onclick="showSettingsTab(\'codes\')">Work Codes</button>' +
      '<button onclick="showSettingsTab(\'accounts\')">Accounts</button>' +
      '<button onclick="showSettingsTab(\'rules\')">Budget Rules</button>' +
    '</div>' +
    '<div id="settings-tab-content"></div>';

  showSettingsTab('mydetails');
}

function showSettingsTab(tab) {
  var btns = document.querySelectorAll('#settings-tabs button');
  btns.forEach(function(btn) { btn.classList.remove('active'); });
  var labels = { mydetails: 0, businesses: 1, codes: 2, accounts: 3, rules: 4 };
  btns[labels[tab]].classList.add('active');

  var renderers = {
    mydetails: renderMyDetailsSettings,
    businesses: renderBusinessSettings,
    codes: renderCodeSettings,
    accounts: renderAccountSettings,
    rules: renderRuleSettings
  };
  renderers[tab]();
}

// --- My Details (Invoice From) ---

function renderMyDetailsSettings() {
  var content = document.getElementById('settings-tab-content');
  var my = AppCache.myDetails || {};

  content.innerHTML =
    '<p>These details appear on your invoices as the "From" section.</p>' +
    '<form id="my-details-form" onsubmit="saveMyDetailsForm(event)">' +
      '<div class="form-row">' +
        '<label>Business / Your Name <input type="text" id="md-biz-name" value="' + escapeHtml(my.business_name || '') + '"></label>' +
        '<label>Contact Name <input type="text" id="md-contact" value="' + escapeHtml(my.contact_name || '') + '"></label>' +
      '</div>' +
      '<div class="form-row">' +
        '<label>Email <input type="email" id="md-email" value="' + escapeHtml(my.email || '') + '"></label>' +
        '<label>Phone <input type="text" id="md-phone" value="' + escapeHtml(my.phone || '') + '"></label>' +
      '</div>' +
      '<label>Address <textarea id="md-address" rows="2">' + escapeHtml(my.address || '') + '</textarea></label>' +
      '<div class="form-row">' +
        '<label>Tax Number (IRD / EIN) <input type="text" id="md-tax" value="' + escapeHtml(my.tax_number || '') + '"></label>' +
        '<label>GST Number <input type="text" id="md-gst" value="' + escapeHtml(my.gst_number || '') + '"></label>' +
      '</div>' +
      '<div class="form-row">' +
        '<label>Bank Account (for payment) <input type="text" id="md-bank" value="' + escapeHtml(my.bank_account || '') + '"></label>' +
        '<label>Payment Terms <input type="text" id="md-terms" value="' + escapeHtml(my.payment_terms || '') + '" placeholder="e.g. Due within 14 days"></label>' +
      '</div>' +
      '<div class="form-actions"><button type="submit">Save Details</button></div>' +
    '</form>';
}

function saveMyDetailsForm(event) {
  event.preventDefault();
  var data = {
    business_name: document.getElementById('md-biz-name').value,
    contact_name: document.getElementById('md-contact').value,
    email: document.getElementById('md-email').value,
    phone: document.getElementById('md-phone').value,
    address: document.getElementById('md-address').value,
    tax_number: document.getElementById('md-tax').value,
    gst_number: document.getElementById('md-gst').value,
    bank_account: document.getElementById('md-bank').value,
    payment_terms: document.getElementById('md-terms').value
  };

  serverCall('saveMyDetails', data).then(function(details) {
    AppCache.myDetails = details;
    showToast('Details saved!');
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

// --- Businesses ---

function renderBusinessSettings() {
  var content = document.getElementById('settings-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getAllBusinesses').then(function(businesses) {
    var html =
      '<details class="add-form-panel"><summary>+ Add New Business</summary><div>' +
      '<form id="add-biz-form" onsubmit="submitBusiness(event)">' +
        '<div class="form-row">' +
          '<label>Name <input type="text" id="biz-name" required></label>' +
          '<label>Contact Name <input type="text" id="biz-contact"></label>' +
        '</div>' +
        '<div class="form-row">' +
          '<label>Email <input type="email" id="biz-email"></label>' +
          '<label>Default Rate (per hr) <input type="number" id="biz-rate" step="0.01"></label>' +
          '<label>Currency <select id="biz-currency">' +
            '<option value="NZD">NZD</option>' +
            '<option value="USD">USD</option>' +
            '<option value="AUD">AUD</option>' +
            '<option value="GBP">GBP</option>' +
            '<option value="EUR">EUR</option>' +
          '</select></label>' +
        '</div>' +
        '<label>Address <textarea id="biz-address" rows="2"></textarea></label>' +
        '<div class="form-actions"><button type="submit">Add Business</button></div>' +
      '</form></div></details>';

    if (businesses.length > 0) {
      html += '<table><thead><tr>' +
        '<th>ID</th><th>Name</th><th>Contact</th><th>Email</th>' +
        '<th class="number">Rate</th><th>Currency</th><th>Active</th>' +
        '</tr></thead><tbody>';

      businesses.forEach(function(b) {
        var isActive = b.active === true || b.active === 'TRUE' || b.active === 'true';
        var cur = b.currency || 'NZD';
        html += '<tr style="' + (isActive ? '' : 'opacity:0.5;') + '">' +
          '<td>' + escapeHtml(b.business_id) + '</td>' +
          '<td>' + escapeHtml(b.name) + '</td>' +
          '<td>' + escapeHtml(b.contact_name) + '</td>' +
          '<td>' + escapeHtml(b.email) + '</td>' +
          '<td class="number">' + formatCurrency(b.default_rate, cur) + '</td>' +
          '<td>' + escapeHtml(cur) + '</td>' +
          '<td>' +
            (isActive
              ? '<button class="outline secondary" onclick="toggleBusiness(' + b._rowIndex + ', false)">Deactivate</button>'
              : '<button class="outline" onclick="toggleBusiness(' + b._rowIndex + ', true)">Activate</button>') +
          '</td>' +
          '</tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p>No businesses configured. Add one above.</p>';
    }

    content.innerHTML = html;
  }).catch(function(err) {
    content.innerHTML = '<p>Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function submitBusiness(event) {
  event.preventDefault();
  var data = {
    name: document.getElementById('biz-name').value,
    contact_name: document.getElementById('biz-contact').value,
    email: document.getElementById('biz-email').value,
    default_rate: Number(document.getElementById('biz-rate').value) || 0,
    currency: document.getElementById('biz-currency').value || 'NZD',
    address: document.getElementById('biz-address').value
  };

  serverCall('addBusiness', data).then(function() {
    showToast('Business added!');
    loadReferenceData();
    renderBusinessSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

function toggleBusiness(rowIndex, active) {
  serverCall('toggleEntityFromClient', 'Businesses|' + rowIndex + '|' + active).then(function() {
    showToast(active ? 'Business activated!' : 'Business deactivated!');
    loadReferenceData();
    renderBusinessSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

// --- Work Codes ---

function renderCodeSettings() {
  var content = document.getElementById('settings-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getAll', 'WorkCodes').then(function(codes) {
    var html =
      '<details class="add-form-panel"><summary>+ Add New Work Code</summary><div>' +
      '<form id="add-code-form" onsubmit="submitWorkCode(event)">' +
        '<div class="form-row">' +
          '<label>Code ID <input type="text" id="wc-id" required placeholder="e.g. DEV, DESIGN, PM"></label>' +
          '<label>Description <input type="text" id="wc-desc" required placeholder="e.g. Software Development"></label>' +
          '<label>Category <select id="wc-cat"><option value="billable">Billable</option><option value="non-billable">Non-billable</option></select></label>' +
        '</div>' +
        '<div class="form-actions"><button type="submit">Add Code</button></div>' +
      '</form></div></details>';

    if (codes.length > 0) {
      html += '<table><thead><tr><th>Code ID</th><th>Description</th><th>Category</th><th>Active</th></tr></thead><tbody>';
      codes.forEach(function(c) {
        var isActive = c.active === true || c.active === 'TRUE' || c.active === 'true';
        html += '<tr style="' + (isActive ? '' : 'opacity:0.5;') + '">' +
          '<td><strong>' + escapeHtml(c.code_id) + '</strong></td>' +
          '<td>' + escapeHtml(c.description) + '</td>' +
          '<td>' + escapeHtml(c.category) + '</td>' +
          '<td>' +
            (isActive
              ? '<button class="outline secondary" onclick="toggleCode(' + c._rowIndex + ', false)">Deactivate</button>'
              : '<button class="outline" onclick="toggleCode(' + c._rowIndex + ', true)">Activate</button>') +
          '</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p>No work codes configured.</p>';
    }

    content.innerHTML = html;
  }).catch(function(err) {
    content.innerHTML = '<p>Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function submitWorkCode(event) {
  event.preventDefault();
  var data = {
    code_id: document.getElementById('wc-id').value.toUpperCase(),
    description: document.getElementById('wc-desc').value,
    category: document.getElementById('wc-cat').value
  };

  serverCall('addWorkCode', data).then(function() {
    showToast('Work code added!');
    loadReferenceData();
    renderCodeSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

function toggleCode(rowIndex, active) {
  serverCall('toggleEntityFromClient', 'WorkCodes|' + rowIndex + '|' + active).then(function() {
    showToast(active ? 'Code activated!' : 'Code deactivated!');
    loadReferenceData();
    renderCodeSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

// --- Accounts ---

function renderAccountSettings() {
  var content = document.getElementById('settings-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getAll', 'Accounts').then(function(accounts) {
    var html =
      '<details class="add-form-panel"><summary>+ Add New Account</summary><div>' +
      '<form id="add-acc-form" onsubmit="submitAccount(event)">' +
        '<div class="form-row">' +
          '<label>Name <input type="text" id="acc-name" required placeholder="e.g. ASB Chequing, Tax Hold"></label>' +
          '<label>Type <select id="acc-type">' +
            '<option value="bank">Bank</option>' +
            '<option value="credit">Credit</option>' +
            '<option value="investment">Investment</option>' +
            '<option value="hold">Hold/Reserve</option>' +
            '<option value="crypto">Crypto</option>' +
            '<option value="other">Other</option>' +
          '</select></label>' +
        '</div>' +
        '<div class="form-row">' +
          '<label>Currency <select id="acc-currency">' +
            '<option value="NZD">NZD</option>' +
            '<option value="USD">USD</option>' +
            '<option value="AUD">AUD</option>' +
            '<option value="GBP">GBP</option>' +
            '<option value="EUR">EUR</option>' +
          '</select></label>' +
          '<label>Purpose <input type="text" id="acc-purpose" placeholder="e.g. savings, tax, spending"></label>' +
        '</div>' +
        '<div class="form-actions"><button type="submit">Add Account</button></div>' +
      '</form></div></details>';

    if (accounts.length > 0) {
      html += '<table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Currency</th><th>Purpose</th><th>Active</th></tr></thead><tbody>';
      accounts.forEach(function(a) {
        var isActive = a.active === true || a.active === 'TRUE' || a.active === 'true';
        html += '<tr style="' + (isActive ? '' : 'opacity:0.5;') + '">' +
          '<td>' + escapeHtml(a.account_id) + '</td>' +
          '<td>' + escapeHtml(a.name) + '</td>' +
          '<td>' + escapeHtml(a.type) + '</td>' +
          '<td>' + escapeHtml(a.currency || 'NZD') + '</td>' +
          '<td>' + escapeHtml(a.purpose) + '</td>' +
          '<td>' +
            (isActive
              ? '<button class="outline secondary" onclick="toggleAccount(' + a._rowIndex + ', false)">Deactivate</button>'
              : '<button class="outline" onclick="toggleAccount(' + a._rowIndex + ', true)">Activate</button>') +
          '</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p>No accounts configured.</p>';
    }

    content.innerHTML = html;
  }).catch(function(err) {
    content.innerHTML = '<p>Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function submitAccount(event) {
  event.preventDefault();
  var data = {
    name: document.getElementById('acc-name').value,
    type: document.getElementById('acc-type').value,
    currency: document.getElementById('acc-currency').value || 'NZD',
    purpose: document.getElementById('acc-purpose').value
  };

  serverCall('addAccount', data).then(function() {
    showToast('Account added!');
    loadReferenceData();
    renderAccountSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

function toggleAccount(rowIndex, active) {
  serverCall('toggleEntityFromClient', 'Accounts|' + rowIndex + '|' + active).then(function() {
    showToast(active ? 'Account activated!' : 'Account deactivated!');
    loadReferenceData();
    renderAccountSettings();
  }).catch(function(err) { showToast(err.message, 'error'); });
}

// --- Budget Rules ---

function renderRuleSettings() {
  var content = document.getElementById('settings-tab-content');
  content.innerHTML = '<div aria-busy="true">Loading...</div>';

  serverCall('getBudgetRules').then(function(rules) {
    var pctFields = [
      { id: 'br-tax-withheld', label: 'Tax Withheld %', field: 'tax_withheld_pct', default: '0' },
      { id: 'br-tax-to-pay', label: 'Tax To Pay %', field: 'tax_to_pay_pct', default: '0.28' },
      { id: 'br-acc-withheld', label: 'ACC Withheld %', field: 'acc_withheld_pct', default: '0' },
      { id: 'br-acc-to-pay', label: 'ACC To Pay %', field: 'acc_to_pay_pct', default: '0.02' },
      { id: 'br-donate', label: 'Donate %', field: 'donate_pct', default: '0.05' },
      { id: 'br-save', label: 'Save %', field: 'save_pct', default: '0.10' },
      { id: 'br-invest', label: 'Invest %', field: 'invest_pct', default: '0.15' },
      { id: 'br-spend', label: 'Spend %', field: 'spend_pct', default: '0.40' }
    ];

    var html =
      '<details class="add-form-panel"><summary>+ Add New Budget Rule</summary><div>' +
      '<form id="add-rule-form" onsubmit="submitBudgetRule(event)">' +
        '<div class="form-row">' +
          '<label>Rule Name <input type="text" id="br-name" required placeholder="e.g. Default Split"></label>' +
        '</div>' +
        '<p class="muted" style="margin:0.5rem 0;font-size:0.82rem;">' +
          '<strong>Withheld</strong> categories (Tax/ACC Withheld) apply to gross invoice total. ' +
          'All other categories apply to net after withheld. Enter as decimals (e.g. 0.28 = 28%).' +
        '</p>' +
        '<div class="form-row">';

    pctFields.forEach(function(f, i) {
      html += '<label>' + f.label + ' <input type="number" id="' + f.id + '" step="0.01" value="' + f.default + '" required></label>';
      if (i === 3) html += '</div><div class="form-row">'; // break into two rows
    });

    html += '</div>' +
        '<div class="form-row">' +
          '<label><input type="checkbox" id="br-default"> Set as default rule</label>' +
          '<label>Notes <input type="text" id="br-notes"></label>' +
        '</div>' +
        '<p id="br-sum-display" style="font-weight:600;"></p>' +
        '<div class="form-actions"><button type="submit">Add Rule</button></div>' +
      '</form></div></details>';

    if (rules.length > 0) {
      html += '<table><thead><tr>' +
        '<th>Name</th>';
      pctFields.forEach(function(f) {
        html += '<th class="number">' + f.label.replace(' %', '') + '</th>';
      });
      html += '<th>Default</th><th>Notes</th></tr></thead><tbody>';

      rules.forEach(function(r) {
        var isDef = r.is_default === true || r.is_default === 'TRUE' || r.is_default === 'true';
        html += '<tr><td><strong>' + escapeHtml(r.name) + '</strong></td>';
        pctFields.forEach(function(f) {
          html += '<td class="number">' + formatPercent(r[f.field]) + '</td>';
        });
        html += '<td>' + (isDef ? 'Yes' : '') + '</td>' +
          '<td>' + escapeHtml(r.notes) + '</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p>No budget rules configured. Add one to start allocating invoice payments.</p>';
    }

    content.innerHTML = html;

    // Live sum display
    pctFields.forEach(function(f) {
      var el = document.getElementById(f.id);
      if (el) el.addEventListener('input', updateRuleSum);
    });
    updateRuleSum();
  }).catch(function(err) {
    content.innerHTML = '<p>Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function updateRuleSum() {
  var withheldIds = ['br-tax-withheld', 'br-acc-withheld'];
  var netIds = ['br-tax-to-pay', 'br-acc-to-pay', 'br-donate', 'br-save', 'br-invest', 'br-spend'];

  var withheldSum = withheldIds.reduce(function(s, id) {
    return s + (Number(document.getElementById(id).value) || 0);
  }, 0);
  var netSum = netIds.reduce(function(s, id) {
    return s + (Number(document.getElementById(id).value) || 0);
  }, 0);

  var display = document.getElementById('br-sum-display');
  if (display) {
    var netOk = Math.abs(netSum - 1.0) < 0.001;
    display.innerHTML =
      'Withheld (from gross): ' + (withheldSum * 100).toFixed(1) + '% &nbsp; ' +
      'Remaining (from net): <strong style="color:' + (netOk ? 'var(--sage)' : 'var(--danger)') + '">' +
      (netSum * 100).toFixed(1) + '%</strong>' +
      (netOk ? '' : ' <span style="color:var(--danger)">&mdash; must equal 100%</span>');
  }
}

function submitBudgetRule(event) {
  event.preventDefault();
  var data = {
    name: document.getElementById('br-name').value,
    tax_withheld_pct: Number(document.getElementById('br-tax-withheld').value),
    tax_to_pay_pct: Number(document.getElementById('br-tax-to-pay').value),
    acc_withheld_pct: Number(document.getElementById('br-acc-withheld').value),
    acc_to_pay_pct: Number(document.getElementById('br-acc-to-pay').value),
    donate_pct: Number(document.getElementById('br-donate').value),
    save_pct: Number(document.getElementById('br-save').value),
    invest_pct: Number(document.getElementById('br-invest').value),
    spend_pct: Number(document.getElementById('br-spend').value),
    is_default: document.getElementById('br-default').checked,
    notes: document.getElementById('br-notes').value
  };

  serverCall('addBudgetRule', data).then(function() {
    showToast('Budget rule added!');
    loadReferenceData();
    renderRuleSettings();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}
</script>
